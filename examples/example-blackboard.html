<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 时代最重要的能力 · 独立思考</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ========== 黑板基础 ========== */
  :root{
    --board:#0E0F0D;
    --board-deep:#070807;
    --board-worn:#263128;
    --board-rgb:17,21,18;
    --chalk:#F2F0E8;
    --chalk-rgb:245,245,245;
    --chalk-yellow:#FFD54F;
    --chalk-yellow-rgb:255,213,79;
    --chalk-blue:#64B5F6;
    --chalk-blue-rgb:100,181,246;
    --chalk-pink:#F48FB1;
    --chalk-pink-rgb:244,143,177;
    --chalk-green:#81C784;
    --chalk-green-rgb:129,199,132;
    --chalk-orange:#FFB74D;
    --chalk-orange-rgb:255,183,77;
    --chalk-red:#EF5350;
    --chalk-red-rgb:239,83,80;
    --chalk-dim:rgba(245,245,245,.35);
    --chalk-glow-white:0 0 10px rgba(245,245,245,.12);
    --chalk-glow-yellow:0 0 10px rgba(255,213,79,.12);
    --chalk-glow-blue:0 0 10px rgba(100,181,246,.1);
    --chalk-glow-pink:0 0 10px rgba(244,143,177,.1);
    --title:"Ma Shan Zheng","ZCOOL XiaoWei",cursive;
    --handwrite:"Liu Jian Mao Cao","Ma Shan Zheng",cursive;
    --sans:"Noto Sans SC","PingFang SC",sans-serif;
    --mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--board-deep);color:var(--chalk);font-family:var(--title);-webkit-font-smoothing:antialiased}

  /* ========== 黑板纹理层 ========== */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse at 18% 16%, rgba(244,240,229,.12) 0%, rgba(244,240,229,.045) 18%, transparent 46%),
      radial-gradient(ellipse at 82% 24%, rgba(244,240,229,.08) 0%, rgba(244,240,229,.035) 20%, transparent 48%),
      radial-gradient(ellipse at 62% 72%, rgba(244,240,229,.07) 0%, rgba(244,240,229,.025) 24%, transparent 52%),
      linear-gradient(0deg, rgba(255,255,255,.025), transparent 18%, transparent 80%, rgba(255,255,255,.018)),
      repeating-linear-gradient(0deg, rgba(244,240,229,.035) 0 1px, transparent 1px 9px),
      repeating-linear-gradient(92deg, rgba(244,240,229,.018) 0 2px, transparent 2px 18px),
      repeating-linear-gradient(17deg, transparent 0 34px, rgba(255,255,255,.022) 34px 38px, transparent 38px 86px),
      linear-gradient(120deg, rgba(255,255,255,.055), transparent 13%, transparent 70%, rgba(0,0,0,.22));
    mix-blend-mode:screen;
    opacity:.86;
  }
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(circle at 8% 8%, rgba(0,0,0,.5), transparent 18%),
      radial-gradient(circle at 94% 88%, rgba(0,0,0,.45), transparent 22%),
      linear-gradient(90deg, rgba(0,0,0,.4), transparent 8%, transparent 92%, rgba(0,0,0,.45)),
      linear-gradient(0deg, rgba(0,0,0,.36), transparent 9%, transparent 88%, rgba(0,0,0,.42));
    box-shadow:inset 0 0 7vw rgba(0,0,0,.58);
  }

  /* ========== Deck ========== */
  #deck{position:fixed;inset:0;width:10000vw;height:100vh;display:flex;flex-wrap:nowrap;transition:transform .8s cubic-bezier(.77,0,.175,1);z-index:10;will-change:transform}
  .slide{width:100vw;height:100vh;flex:0 0 100vw;position:relative;padding:4.2vh 3.8vw 4.5vh 3.8vw;display:flex;flex-direction:column;overflow:hidden;background:transparent;color:var(--chalk);z-index:1}
  .chalk-canvas{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1}
  .chalk-a11y{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .slide::before{content:"";position:absolute;inset:1.4vh .9vw;z-index:0;pointer-events:none;border:1.5px solid rgba(242,240,232,.28);box-shadow:inset 0 0 1px rgba(242,240,232,.25),0 0 0 1px rgba(0,0,0,.45);background:
    repeating-radial-gradient(circle at 20% 30%, rgba(244,240,229,.045) 0 1px, transparent 1px 4px),
    linear-gradient(2deg, transparent 0 16%, rgba(244,240,229,.035) 17%, transparent 19% 41%, rgba(244,240,229,.025) 42%, transparent 44%),
    linear-gradient(88deg, transparent 0 28%, rgba(244,240,229,.018) 29%, transparent 31% 72%, rgba(244,240,229,.016) 73%, transparent 75%);
    opacity:.78;filter:blur(.15px)}

  /* ========== 粉笔颜色 ========== */
  .chalk-yellow{color:var(--chalk-yellow)}
  .chalk-blue{color:var(--chalk-blue)}
  .chalk-pink{color:var(--chalk-pink)}
  .chalk-green{color:var(--chalk-green)}
  .chalk-orange{color:var(--chalk-orange)}
  .chalk-red{color:var(--chalk-red)}
  .chalk-dim{color:var(--chalk-dim)}

  /* ========== 粉笔字体层级 ==========
     不同层级 = 不同粗细的"粉笔"
     .chalk-title  → 大粉笔（粗、厚、重，强纹理）
     .chalk-h1     → 中粉笔（中等粗细）
     .chalk-h2     → 细粉笔（手写体，自然流畅）
     .chalk-body   → 普通粉笔（参考要求"略粗"）
     .chalk-note   → 注释粉笔（手写注释感）
     .chalk-mono   → 等宽粉笔（代码/标签）
     所有层级共用粉笔纹理：多层 text-shadow 模拟毛糙边缘
  */
  .chalk-title{
    font-family:var(--title);
    font-size:max(44px,7.4vw);
    line-height:1.12;
    letter-spacing:.02em;
    color:#FFF;
    text-shadow:
      .5px 0 rgba(244,240,229,.55),
      -.8px .4px rgba(244,240,229,.26),
      0 0 1px rgba(244,240,229,.45),
      0 0 15px rgba(255,255,255,.1),
      1px 2px 3px rgba(0,0,0,.6),
      -1px -1px 2px rgba(0,0,0,.4),
      .8px .8px 0 rgba(255,255,255,.08),
      -.5px .3px 0 rgba(255,255,255,.05),
      0 0 4px rgba(255,255,255,.06);
    filter:url(#chalk-texture);
  }
  .chalk-h1{
    font-family:var(--title);
    font-size:max(30px,4.2vw);
    line-height:1.18;
    letter-spacing:.025em;
    color:#FFF;
    text-shadow:
      .45px 0 rgba(244,240,229,.45),
      -.55px .35px rgba(244,240,229,.2),
      0 0 1px rgba(244,240,229,.35),
      0 0 10px rgba(255,255,255,.08),
      1px 1px 2px rgba(0,0,0,.55),
      -.5px -.5px 1.5px rgba(0,0,0,.35),
      .5px .3px 0 rgba(255,255,255,.06);
    filter:url(#chalk-texture);
  }
  .chalk-h2{
    font-family:var(--handwrite);
    font-size:max(24px,2.8vw);
    line-height:1.3;
    letter-spacing:.015em;
    color:rgba(255,255,255,.9);
    text-shadow:
      .35px .15px rgba(244,240,229,.35),
      -.45px .2px rgba(244,240,229,.16),
      0 0 8px rgba(255,255,255,.06),
      .5px .5px 1px rgba(0,0,0,.5),
      -.3px .2px 0 rgba(255,255,255,.04);
    filter:url(#chalk-texture);
  }
  .chalk-body{
    font-family:var(--title);
    font-weight:400;
    font-size:max(18px,1.65vw);
    line-height:1.42;
    color:rgba(255,255,255,.9);
    text-shadow:
      .3px 0 rgba(244,240,229,.25),
      -.25px .15px rgba(244,240,229,.12),
      0 0 5px rgba(255,255,255,.04),
      .5px .5px .5px rgba(0,0,0,.35),
      -.2px .2px 0 rgba(255,255,255,.03);
    filter:url(#chalk-texture);
  }
  .chalk-body-strong{
    font-family:var(--title);
    font-weight:500;
    font-size:max(21px,1.9vw);
    line-height:1.35;
    color:rgba(255,255,255,.92);
    text-shadow:
      .3px 0 rgba(244,240,229,.28),
      0 0 6px rgba(255,255,255,.05),
      .5px .5px 1px rgba(0,0,0,.4);
    filter:url(#chalk-texture);
  }
  .chalk-note{
    font-family:var(--handwrite);
    font-size:max(17px,1.35vw);
    line-height:1.45;
    color:rgba(255,255,255,.72);
    text-shadow:
      .25px 0 rgba(244,240,229,.22),
      0 0 4px rgba(255,255,255,.03),
      .3px .3px .5px rgba(0,0,0,.3);
    filter:url(#chalk-texture);
  }
  .chalk-mono{
    font-family:var(--title);
    font-weight:300;
    font-size:max(16px,1.2vw);
    letter-spacing:.04em;
    color:rgba(255,255,255,.86);
    text-shadow:0 0 3px rgba(255,255,255,.02);
  }

  /* ========== 粉笔手绘框 ========== */
  .chalk-box{border:0;padding:2vh 2.2vw;position:relative;border-radius:1px;box-shadow:inset 0 0 8px rgba(255,255,255,.02)}
  .chalk-box::before,.chalk-box::after{content:"";position:absolute;inset:0;pointer-events:none;border:2.5px solid rgba(245,245,245,.28);transform:rotate(-.25deg);filter:url(#chalk-texture)}
  .chalk-box::after{inset:2px -2px -1px 1px;opacity:.45;transform:rotate(.35deg)}
  .chalk-box>*{position:relative;z-index:1}
  .chalk-box.yellow{box-shadow:inset 0 0 8px rgba(255,213,79,.03)}
  .chalk-box.yellow::before,.chalk-box.yellow::after{border-color:rgba(255,213,79,.52)}
  .chalk-box.blue::before,.chalk-box.blue::after{border-color:rgba(100,181,246,.52)}
  .chalk-box.pink::before,.chalk-box.pink::after{border-color:rgba(244,143,177,.52)}
  .chalk-box.green::before,.chalk-box.green::after{border-color:rgba(129,199,132,.52)}
  .chalk-box.orange::before,.chalk-box.orange::after{border-color:rgba(255,183,77,.52)}
  .chalk-box.red::before,.chalk-box.red::after{border-color:rgba(239,83,80,.52)}
  .chalk-box.dashed::before,.chalk-box.dashed::after{border-style:dashed}
  .chalk-box.dotted::before,.chalk-box.dotted::after{border-style:dotted}
  .chalk-box.thick::before,.chalk-box.thick::after{border-width:4px}

  .chalk-underline{display:inline;padding-bottom:2px;border-bottom:2.5px solid var(--chalk-yellow);box-shadow:0 1px 0 rgba(255,213,79,.08)}
  .chalk-underline.blue{border-color:var(--chalk-blue)}
  .chalk-underline.pink{border-color:var(--chalk-pink)}
  .chalk-underline.green{border-color:var(--chalk-green)}

  .chalk-circle{display:inline-flex;align-items:center;justify-content:center;width:2.4em;height:2.4em;border-radius:50%;border:2.5px solid var(--chalk-yellow);font-family:var(--title);font-size:max(13px,1vw);text-shadow:0 0 5px rgba(255,213,79,.1)}

  /* ========== 参考图式黑板知识卡片组件 ========== */
  .board-title-row{display:flex;align-items:center;gap:1.2vw;margin-bottom:2vh}
  .board-title-row .title-mark{font-family:var(--title);font-size:max(26px,2.4vw);color:var(--chalk)}
  .chalk-heading{font-family:var(--title);font-size:max(30px,3.4vw);line-height:1.12;color:var(--chalk);filter:url(#chalk-texture);text-shadow:.5px 0 rgba(244,240,229,.5),-.6px .35px rgba(244,240,229,.22),0 0 8px rgba(255,255,255,.08)}
  .chalk-rule{height:3px;width:100%;max-width:42vw;background:var(--chalk-yellow);filter:url(#chalk-texture);box-shadow:0 1px 0 rgba(255,213,79,.15);transform:rotate(-.5deg);margin:.7vh 0 1.6vh}
  .chalk-rule.pink{background:var(--chalk-pink)}
  .chalk-rule.blue{background:var(--chalk-blue)}
  .chalk-rule.short{max-width:26vw}
  .chalk-word{font-family:var(--title);font-size:max(34px,5.6vw);line-height:1;color:var(--chalk-yellow);filter:url(#chalk-texture);text-shadow:.8px 0 rgba(255,213,79,.45),-.7px .4px rgba(255,213,79,.22),0 0 10px rgba(255,213,79,.12)}
  .chalk-word.white{color:var(--chalk)}
  .chalk-word.pink{color:var(--chalk-pink)}
  .chalk-page{position:absolute;right:2.3vw;bottom:2.2vh;font-family:var(--title);font-size:max(22px,2vw);color:var(--chalk)}
  .chalk-tag-cloud{display:inline-block;border:2.5px solid var(--chalk-blue);border-radius:35% 42% 38% 45%;padding:1.1vh 1.6vw;font-family:var(--title);font-size:max(16px,1.5vw);line-height:1.28;color:var(--chalk);filter:url(#chalk-texture);transform:rotate(-2deg)}
  .chalk-bubble{border:3px solid var(--chalk-pink);border-radius:43% 37% 45% 34%;padding:2vh 2.4vw;font-family:var(--title);font-size:max(22px,2.1vw);line-height:1.42;text-align:center;filter:url(#chalk-texture)}
  .chalk-quote-box{border:4px solid var(--chalk-yellow);border-radius:16px 11px 18px 10px;padding:3vh 4vw;font-family:var(--title);font-size:max(26px,2.7vw);line-height:1.45;text-align:center;filter:url(#chalk-texture);position:relative}
  .chalk-quote-mark{font-family:var(--title);font-size:max(44px,5vw);line-height:1;color:var(--chalk-yellow)}
  .number-list{list-style:none;display:flex;flex-direction:column;gap:1vh}
  .number-list li{display:grid;grid-template-columns:2.2em 1fr;gap:.8vw;align-items:start;font-family:var(--title);font-size:max(18px,1.7vw);line-height:1.35;color:var(--chalk)}
  .number-list .num{display:inline-flex;align-items:center;justify-content:center;width:1.65em;height:1.65em;border:2.5px solid var(--chalk-yellow);border-radius:50%;color:var(--chalk-yellow);filter:url(#chalk-texture)}
  .icon-flow{display:grid;grid-template-columns:repeat(5,1fr);gap:1vw;align-items:start;margin-top:2vh}
  .icon-step{text-align:center;display:flex;flex-direction:column;align-items:center;gap:1vh}
  .icon-step svg{width:5.8vw;height:5.8vw}
  .icon-step .label{font-family:var(--title);font-size:max(19px,1.7vw);line-height:1.15}
  .icon-step .desc{font-family:var(--title);font-size:max(15px,1.25vw);line-height:1.25;color:rgba(255,255,255,.84)}
  .chalk-checklist{list-style:none;display:flex;flex-direction:column;gap:1.2vh}
  .chalk-checklist li{display:grid;grid-template-columns:2em 1fr;gap:.8vw;align-items:center;font-family:var(--title);font-size:max(21px,2vw);line-height:1.2}
  .chalk-checklist .box{width:1.25em;height:1.25em;border:3px solid var(--chalk-blue);position:relative;filter:url(#chalk-texture)}
  .chalk-checklist .box::after{content:"";position:absolute;left:18%;top:43%;width:65%;height:35%;border-left:3px solid var(--chalk-blue);border-bottom:3px solid var(--chalk-blue);transform:rotate(-45deg)}

  /* ========== 手绘 SVG 元素 ========== */
  .chalk-arrow{display:inline-block;vertical-align:middle;margin:0 .4vw;fill:none;stroke:var(--chalk-dim);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-arrow.yellow{stroke:var(--chalk-yellow)}
  .chalk-arrow.blue{stroke:var(--chalk-blue)}
  .chalk-arrow.green{stroke:var(--chalk-green)}
  .chalk-arrow.pink{stroke:var(--chalk-pink)}

  .stickman{display:inline-block;vertical-align:middle;fill:none;stroke:var(--chalk);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .stickman.sm{width:2.5vw;height:5vw;stroke-width:2}
  .stickman.lg{width:5vw;height:10vw;stroke-width:3}
  .stickman.xl{width:7vw;height:14vw;stroke-width:3.5}
  .stickman.yellow{stroke:var(--chalk-yellow)}
  .stickman.blue{stroke:var(--chalk-blue)}
  .stickman.pink{stroke:var(--chalk-pink)}

  .chalk-lightbulb{display:inline-block;width:3vw;height:4.5vw;fill:none;stroke:var(--chalk-yellow);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-lightbulb.blue{stroke:var(--chalk-blue)}
  .chalk-lightbulb.pink{stroke:var(--chalk-pink)}

  .chalk-check{display:inline-block;width:1.8vw;height:1.8vw;fill:none;stroke:var(--chalk-green);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}

  /* ========== 扩展手绘 SVG 元素 ========== */
  .chalk-brain{display:inline-block;width:4vw;height:4vw;fill:none;stroke:var(--chalk-pink);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-magnifier{display:inline-block;width:3.5vw;height:3.5vw;fill:none;stroke:var(--chalk-blue);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-robot{display:inline-block;width:3.5vw;height:4.5vw;fill:none;stroke:var(--chalk-yellow);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-dialog{display:inline-block;width:4vw;height:3.2vw;fill:none;stroke:var(--chalk-green);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-book{display:inline-block;width:3.5vw;height:3.5vw;fill:none;stroke:var(--chalk);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-rocket{display:inline-block;width:3.5vw;height:4.5vw;fill:none;stroke:var(--chalk-yellow);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-star{display:inline-block;width:3vw;height:3vw;fill:none;stroke:var(--chalk-yellow);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-target{display:inline-block;width:3.5vw;height:3.5vw;fill:none;stroke:var(--chalk-pink);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-flag{display:inline-block;width:2.8vw;height:4vw;fill:none;stroke:var(--chalk-green);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

  .chalk-arrow,.stickman,.chalk-lightbulb,.chalk-check,.chalk-brain,.chalk-magnifier,.chalk-robot,.chalk-dialog,.chalk-book,.chalk-rocket,.chalk-star,.chalk-target,.chalk-flag{filter:url(#chalk-texture);opacity:.94}

  /* ========== 布局工具 ========== */
  .frame{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative;z-index:1}
  .fill{flex:1}
  .center{align-items:center;justify-content:center;text-align:center}
  .col{display:flex;flex-direction:column;gap:1.5vh}
  .row{display:flex;align-items:center;gap:1.5vw;flex-wrap:wrap}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:2.5vw;flex:1;align-items:start}
  .split-6-6{display:grid;grid-template-columns:1fr 1fr;gap:2vw;align-items:start;flex:1}
  .split-7-5{display:grid;grid-template-columns:7fr 5fr;gap:2vw;align-items:start;flex:1}
  .gap-sm{height:1.2vh}
  .gap-md{height:2.5vh}
  .gap-lg{height:4vh}

  /* ========== 推导流程 ========== */
  .flow-step{display:flex;flex-direction:column;gap:.5vh;padding:1.2vh 1.8vw;border-left:3.5px solid var(--chalk-yellow);position:relative}
  .flow-step::before{content:"";position:absolute;left:-3.5px;top:0;bottom:0;width:3.5px;background:var(--chalk-yellow);opacity:.3}
  .flow-step.blue{border-color:var(--chalk-blue)}.flow-step.blue::before{background:var(--chalk-blue)}
  .flow-step.green{border-color:var(--chalk-green)}.flow-step.green::before{background:var(--chalk-green)}
  .flow-step.pink{border-color:var(--chalk-pink)}.flow-step.pink::before{background:var(--chalk-pink)}
  .flow-step.orange{border-color:var(--chalk-orange)}.flow-step.orange::before{background:var(--chalk-orange)}
  .flow-step .step-label{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--chalk-dim)}
  .flow-step .step-body{font-family:var(--handwrite);font-size:max(16px,1.25vw);line-height:1.4;color:rgba(255,255,255,.9);text-shadow:0 0 5px rgba(255,255,255,.05)}
  .flow-step .step-body .highlight{color:var(--chalk-yellow);font-family:var(--handwrite);font-size:max(18px,1.35vw)}
  .flow-step .step-body .highlight.blue{color:var(--chalk-blue)}
  .flow-step .step-body .highlight.pink{color:var(--chalk-pink)}
  .flow-step .step-body .highlight.green{color:var(--chalk-green)}

  /* ========== 思维导图 ========== */
  .mind-map-center{text-align:center;padding:2vh 2.5vw;border:3px solid var(--chalk-yellow);display:inline-block;margin:0 auto 2vh auto;font-family:var(--title);font-size:max(18px,1.6vw);text-shadow:0 0 8px rgba(255,213,79,.1);box-shadow:1px 1px 0 rgba(255,213,79,.08)}
  .mind-map-branches{display:flex;gap:1.2vw;justify-content:center;flex-wrap:wrap}
  .mind-map-branch{flex:1;min-width:0;padding-top:1.2vh;text-align:center}

<script>
window.ChalkCanvas=(()=>{
  const W=1536,H=864;
  const C={board:"#101411",white:"#fff9e9",yellow:"#ffd52f",blue:"#4dc8ff",pink:"#ff6294",green:"#89e052",dim:"rgba(255,249,233,.16)"};

  function rng(seed){
    let state=seed>>>0;
    return()=>{
      state+=0x6D2B79F5;
      let n=state;
      n=Math.imul(n^n>>>15,n|1);
      n^=n+Math.imul(n^n>>>7,n|61);
      return((n^n>>>14)>>>0)/4294967296;
    };
  }

  function noise2(x,y,seed){
    let n=Math.imul((x|0)+seed*374761393,668265263)^Math.imul((y|0)+seed*144269,2246822519);
    n=Math.imul(n^n>>>13,1274126177);
    return((n^n>>>16)>>>0)/4294967295;
  }

  function mount(canvas,draw){
    const ctx=canvas.getContext("2d");

    function chalkPath(points,color,width=5,seed=1,closed=false,passes=2){
      const random=rng(seed);
      ctx.save();
      ctx.lineCap="round";
      ctx.lineJoin="round";
      for(let pass=0;pass<Math.max(2,passes);pass++){
        ctx.beginPath();
        points.forEach((p,index)=>{
          const jitter=width*(pass ? .16 : .055);
          const x=p[0]+(random()-.5)*jitter;
          const y=p[1]+(random()-.5)*jitter;
          if(!index)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        });
        if(closed)ctx.closePath();
        ctx.strokeStyle=color;
        ctx.globalAlpha=pass ? .22 : .83;
        ctx.lineWidth=width*(pass ? .44 : 1);
        if(pass){
          ctx.setLineDash([width*(1.2+random()),width*(2.8+random()*3.8),width*(.7+random()),width*(4+random()*4)]);
          ctx.lineDashOffset=-random()*width*7;
        }else ctx.setLineDash([]);
        ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.globalAlpha=.34;
      ctx.strokeStyle=color;
      ctx.lineWidth=Math.max(.7,width*.22);
      for(let i=1;i<points.length;i++){
        if(random()<.68)continue;
        const a=points[i-1],b=points[i];
        const t1=random()*.62;
        const t2=Math.min(1,t1+.1+random()*.22);
        const ox=(random()-.5)*width*.8;
        const oy=(random()-.5)*width*.8;
        ctx.beginPath();
        ctx.moveTo(a[0]+(b[0]-a[0])*t1+ox,a[1]+(b[1]-a[1])*t1+oy);
        ctx.lineTo(a[0]+(b[0]-a[0])*t2+ox,a[1]+(b[1]-a[1])*t2+oy);
        ctx.stroke();
      }
      ctx.globalAlpha=.18;
      ctx.fillStyle=color;
      const dust=Math.max(10,Math.round(points.length*width*.95));
      for(let i=0;i<dust;i++){
        const p=points[Math.floor(random()*points.length)];
        const r=.2+random()*.9;
        ctx.beginPath();
        ctx.ellipse(p[0]+(random()-.5)*width*1.8,p[1]+(random()-.5)*width*1.45,r*(1.2+random()*1.8),r,(random()-.5)*.5,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }

    function curve(points,color,width=5,seed=1){
      const sampled=[];
      for(let i=0;i+3<points.length;i+=4){
        const p0=points[i],p1=points[i+1],p2=points[i+2],p3=points[i+3];
        for(let t=0;t<=1;t+=.035){
          const m=1-t;
          sampled.push([m*m*m*p0[0]+3*m*m*t*p1[0]+3*m*t*t*p2[0]+t*t*t*p3[0],m*m*m*p0[1]+3*m*m*t*p1[1]+3*m*t*t*p2[1]+t*t*t*p3[1]]);
        }
      }
      chalkPath(sampled,color,width,seed);
    }

    function chalkText(text,x,y,size,color=C.white,seed=1,options={}){
      const random=rng(seed);
      const font=options.font||`"HanziPen SC","Hannotate SC","Kaiti SC","STKaiti",cursive`;
      let cursor=x;
      [...text].forEach((char,index)=>{
        const charSize=size*(1+(random()-.5)*(options.scale||.07));
        ctx.font=`${options.weight||400} ${charSize}px ${font}`;
        const width=ctx.measureText(char).width;
        const baselineShift=(random()-.5)*(options.baseline||4);
        const rotation=(random()-.5)*(options.rotate||.035);
        const title=size>=64;
        const pad=Math.ceil(charSize*.24);
        const layer=document.createElement("canvas");
        layer.width=Math.max(4,Math.ceil(width+pad*2));
        layer.height=Math.max(4,Math.ceil(charSize*1.5+pad*2));
        const lctx=layer.getContext("2d");
        lctx.font=`${options.weight||400} ${charSize}px ${font}`;
        lctx.textAlign="center";
        lctx.textBaseline="alphabetic";
        lctx.fillStyle=color;
        lctx.fillText(char,layer.width/2,pad+charSize);
        const pixels=lctx.getImageData(0,0,layer.width,layer.height);
        const data=pixels.data;
        for(let py=0;py<layer.height;py++){
          for(let px=0;px<layer.width;px++){
            const offset=(py*layer.width+px)*4;
            const source=data[offset+3];
            if(!source)continue;
            const fiberA=noise2(Math.floor(px/3),Math.floor(py/1.4),seed+index*37+7);
            const fiberB=noise2(Math.floor(px/8),Math.floor(py/3),seed+index*37+13);
            const deposit=noise2(Math.floor(px/13),Math.floor(py/11),seed+index*37+19);
            const coverage=title ? .74+fiberA*.1+fiberB*.07+deposit*.13 : .89+fiberA*.035+fiberB*.025+deposit*.045;
            data[offset+3]=Math.round(source*Math.min(.99,coverage));
          }
        }
        lctx.putImageData(pixels,0,0);
        const materialRandom=rng(seed+index*101+701);
        lctx.fillStyle=color;
        lctx.globalAlpha=title ? .2 : .1;
        const powderCount=Math.round(charSize*(title ? .56 : .18));
        for(let i=0;i<powderCount;i++){
          const px=pad+materialRandom()*Math.max(1,width);
          const py=pad+charSize*.08+materialRandom()*charSize*.98;
          const sourceIndex=(Math.floor(py)*layer.width+Math.floor(px))*4+3;
          if(data[sourceIndex]<28)continue;
          const radius=.18+materialRandom()*(title ? .9 : .45);
          lctx.beginPath();
          lctx.ellipse(px+(materialRandom()-.5)*(title?3.4:1.4),py+(materialRandom()-.5)*(title?2.8:1.1),radius*(1.2+materialRandom()*1.8),radius,(materialRandom()-.5)*.5,0,Math.PI*2);
          lctx.fill();
        }
        ctx.save();
        ctx.translate(cursor+width/2,y+baselineShift);
        ctx.rotate(rotation);
        ctx.drawImage(layer,-layer.width/2,-(pad+charSize));
        ctx.restore();
        cursor+=width+(options.spacing??size*.02);
      });
      return cursor;
    }

    function smoothClosed(points,color,width=5,seed=1){
      const random=rng(seed);
      ctx.save();
      ctx.lineCap="round";
      ctx.lineJoin="round";
      for(let pass=0;pass<2;pass++){
        const jitter=pass?1.7:.6;
        const pts=points.map(p=>[p[0]+(random()-.5)*jitter,p[1]+(random()-.5)*jitter]);
        ctx.beginPath();
        const last=pts[pts.length-1],first=pts[0];
        ctx.moveTo((last[0]+first[0])/2,(last[1]+first[1])/2);
        for(let i=0;i<pts.length;i++){
          const current=pts[i],next=pts[(i+1)%pts.length];
          ctx.quadraticCurveTo(current[0],current[1],(current[0]+next[0])/2,(current[1]+next[1])/2);
        }
        ctx.closePath();
        ctx.strokeStyle=color;
        ctx.lineWidth=pass?width*.4:width;
        ctx.globalAlpha=pass ? .2 : .83;
        if(pass){
          ctx.setLineDash([width*1.4,width*4.2,width*.8,width*5.4]);
          ctx.lineDashOffset=-random()*width*5;
        }else ctx.setLineDash([]);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBackground(seed=9204){
      ctx.fillStyle=C.board;
      ctx.fillRect(0,0,W,H);
      const random=rng(seed);
      for(let i=0;i<28;i++){
        const x=random()*W,y=random()*H,w=90+random()*260;
        const g=ctx.createRadialGradient(x,y,0,x,y,w);
        g.addColorStop(0,`rgba(238,238,222,${.006+random()*.012})`);
        g.addColorStop(1,"rgba(238,238,222,0)");
        ctx.fillStyle=g;
        ctx.fillRect(x-w,y-w*.25,w*2,w*.5);
      }
      for(let i=0;i<380;i++){
        ctx.fillStyle=`rgba(255,250,232,${.012+random()*.035})`;
        const x=random()*W,y=random()*H,r=.3+random()*1.1;
        ctx.beginPath();
        ctx.ellipse(x,y,r*(1+random()*2),r,(random()-.5)*.5,0,Math.PI*2);
        ctx.fill();
      }
    }

    function render(){
      const dpr=Math.min(devicePixelRatio||1,2);
      canvas.width=Math.round(W*dpr);
      canvas.height=Math.round(H*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,W,H);
      drawBackground();
      draw(ctx,{W,H,C,rng,noise2,chalkPath,curve,chalkText,smoothClosed,drawBackground});
    }

    document.fonts.ready.then(render);
    addEventListener("resize",render);
    return{render};
  }

  return{W,H,C,rng,noise2,mount};
})();
</script>

<script>
(() => {
  const { C } = window.ChalkCanvas;

  function helpers(ctx, api) {
    const { chalkText, chalkPath, curve, smoothClosed } = api;

    function line(points, color, width, seed, closed = false) {
      chalkPath(points, color, width, seed, closed);
    }

    function underline(x1, y1, x2, y2, color, seed, width = 5) {
      curve([[x1,y1],[x1+(x2-x1)*.28,y1-4],[x1+(x2-x1)*.66,y1+5],[x2,y2]], color, width, seed);
    }

    function arrow(x1, y1, x2, y2, color, seed, width = 6) {
      const angle = Math.atan2(y2-y1, x2-x1);
      curve([[x1,y1],[(x1+x2)/2,y1-10],[(x1+x2)/2,y2+8],[x2,y2]], color, width, seed);
      const len = 22 + width;
      line([
        [x2-Math.cos(angle-.58)*len,y2-Math.sin(angle-.58)*len],
        [x2,y2],
        [x2-Math.cos(angle+.58)*len,y2-Math.sin(angle+.58)*len]
      ], color, width, seed+1);
    }

    function cloud(x, y, w, h, color, seed) {
      smoothClosed([
        [x+w*.04,y+h*.58],[x+w*.08,y+h*.3],[x+w*.22,y+h*.28],
        [x+w*.28,y+h*.05],[x+w*.43,y+h*.16],[x+w*.54,y+h*.02],
        [x+w*.65,y+h*.18],[x+w*.79,y+h*.13],[x+w*.83,y+h*.38],
        [x+w*.98,y+h*.47],[x+w*.9,y+h*.7],[x+w*.76,y+h*.7],
        [x+w*.69,y+h*.94],[x+w*.52,y+h*.84],[x+w*.4,y+h*.97],
        [x+w*.29,y+h*.82],[x+w*.15,y+h*.87],[x+w*.16,y+h*.69]
      ], color, 5, seed);
    }

    function bulb(cx, cy, s, seed) {
      curve([
        [cx-60*s,cy+15*s],[cx-94*s,cy-88*s],[cx-42*s,cy-126*s],[cx,cy-130*s],
        [cx,cy-130*s],[cx+52*s,cy-132*s],[cx+92*s,cy-78*s],[cx+59*s,cy+18*s],
        [cx+59*s,cy+18*s],[cx+45*s,cy+37*s],[cx+42*s,cy+54*s],[cx+38*s,cy+68*s]
      ], C.white, 6, seed);
      curve([[cx-60*s,cy+15*s],[cx-47*s,cy+36*s],[cx-44*s,cy+52*s],[cx-40*s,cy+68*s]], C.white, 6, seed+1);
      line([[cx-43*s,cy+68*s],[cx+40*s,cy+68*s]], C.white, 7, seed+2);
      line([[cx-38*s,cy+83*s],[cx+34*s,cy+83*s]], C.white, 7, seed+3);
      line([[cx-29*s,cy+98*s],[cx+25*s,cy+98*s]], C.white, 7, seed+4);
      curve([
        [cx-23*s,cy+13*s],[cx-16*s,cy-12*s],[cx-7*s,cy-25*s],[cx-1*s,cy-50*s],
        [cx-1*s,cy-50*s],[cx+7*s,cy-25*s],[cx+17*s,cy-12*s],[cx+23*s,cy+13*s]
      ], C.yellow, 5, seed+5);
      [[-98,-82],[-70,-122],[-18,-152],[44,-145],[93,-103],[112,-45],[104,18]].forEach((p,i) => {
        const a = Math.atan2(p[1],p[0]);
        line([
          [cx+Math.cos(a)*104*s,cy+Math.sin(a)*104*s],
          [cx+Math.cos(a)*(126+(i%3)*8)*s,cy+Math.sin(a)*(126+(i%3)*8)*s]
        ], i%2 ? C.white : C.yellow, 6, seed+20+i);
      });
    }

    function question(cx, cy, s, color, seed) {
      const pts = Array.from({length:48}, (_,i) => {
        const a = i/47*Math.PI*2;
        return [cx+Math.cos(a)*45*s*(1+.04*Math.sin(i*.8)),cy+Math.sin(a)*45*s*(1+.05*Math.cos(i*.7))];
      });
      line(pts, color, 5, seed, true);

<div id="nav"></div>

<script>
const deck=document.getElementById('deck');
const slides=deck.querySelectorAll('.slide');
const nav=document.getElementById('nav');
let idx=0,total=slides.length,lock=false;
deck.style.width=(total*100)+'vw';
slides.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='dot';b.dataset.i=i;b.setAttribute('aria-label','Page '+(i+1));
  b.onclick=()=>go(i);
  nav.appendChild(b);
});
function go(n){
  if(lock)return;
  idx=Math.max(0,Math.min(total-1,n));
  window.__currentSlideIndex=idx;
  deck.style.transform=`translateX(${-idx*100}vw)`;
  nav.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  if(window.__playSlide)setTimeout(()=>window.__playSlide(idx),450);
  lock=true;setTimeout(()=>lock=false,700);
}
let overviewOn=false;
const ov=document.createElement('div');
ov.id='overview';ov.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.95);backdrop-filter:blur(8px);display:none;overflow-y:auto;padding:3vh 4vw';
document.body.appendChild(ov);
function buildOverview(){
  ov.innerHTML='';const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:2vh 1.6vw;max-width:90vw;margin:0 auto';
  slides.forEach((s,i)=>{const c=document.createElement('div');c.style.cssText='cursor:pointer;overflow:hidden;border:2px solid '+(i===idx?'var(--chalk-yellow)':'rgba(255,255,255,.08)');const w=document.createElement('div');w.style.cssText='width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;pointer-events:none;background:var(--board)';const cl=s.cloneNode(true);cl.style.cssText='width:100vw;height:100vh;transform:scale('+(1/4.5)+');transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none';const sourceCanvases=s.querySelectorAll('canvas');cl.querySelectorAll('canvas').forEach((target,j)=>{const source=sourceCanvases[j];if(!source)return;target.width=source.width;target.height=source.height;target.getContext('2d').drawImage(source,0,0);});w.appendChild(cl);const l=document.createElement('div');l.style.cssText='padding:5px 8px;font-family:var(--mono);font-size:8px;color:var(--chalk-dim)';l.textContent=(i+1)+' / '+total;c.appendChild(w);c.appendChild(l);c.onclick=()=>{toggleOverview();go(i)};grid.appendChild(c);});
  ov.appendChild(grid);
}
function toggleOverview(){overviewOn=!overviewOn;if(overviewOn){buildOverview();ov.style.display='block';}else{ov.style.display='none';}}
addEventListener('keydown',e=>{
  if(e.key==='Escape'){e.preventDefault();toggleOverview();return;}
  if(e.key&&e.key.toLowerCase()==='b'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){e.preventDefault();window.__setLowPowerMode(!window.__lowPowerMode);return;}
  if(overviewOn)return;
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '||e.key==='ArrowDown'){if(window.__pipeAdvance&&window.__pipeAdvance())return;go(idx+1);return;}
  if(e.key==='ArrowLeft'||e.key==='PageUp'||e.key==='ArrowUp')go(idx-1);
  if(e.key==='Home')go(0);if(e.key==='End')go(total-1);
});
let wheelTO=null,wheelAcc=0;
addEventListener('wheel',e=>{wheelAcc+=e.deltaY+e.deltaX;if(Math.abs(wheelAcc)>50){if(wheelAcc>0&&window.__pipeAdvance&&window.__pipeAdvance()){wheelAcc=0;}else{go(idx+(wheelAcc>0?1:-1));wheelAcc=0;}}clearTimeout(wheelTO);wheelTO=setTimeout(()=>wheelAcc=0,150);},{passive:true});
let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;const dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){if(dx<0&&window.__pipeAdvance&&window.__pipeAdvance())return;go(idx+(dx<0?1:-1));}},{passive:true});
go(0);
</script>

<script type="module">
let motion;
try{motion=await import('../assets/motion.min.js');}catch(e1){try{motion=await import('https://cdn.jsdelivr.net/npm/motion@11.11.17/+esm');}catch(e2){console.warn('[motion] failed',e1,e2);document.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none'});}}
if(motion){const{animate,stagger}=motion;document.body.classList.add('motion-ready');const EASE=[.22,1,.36,1];const slides=[...document.querySelectorAll('.slide')];let lastIdx=-1;
function resetAnims(s){s.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='';el.style.transform='';});}
function revealStatic(s){resetAnims(s);document.getAnimations?.().forEach(a=>a.cancel());s.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none';});}
function playSlide(i){const slide=slides[i];if(!slide)return;lastIdx=i;if(window.__lowPowerMode){revealStatic(slide);return;}resetAnims(slide);const all=[...slide.querySelectorAll('[data-anim]')];if(!all.length)return;const groups=[];let cur=[];all.forEach(el=>{if(el.dataset.anim==='step'){if(cur.length)groups.push(cur);groups.push([el]);cur=[];}else{cur.push(el);}});if(cur.length)groups.push(cur);if(groups.length){groups.forEach((g,i)=>{const base=i*.25;g.forEach(el=>{const tag=el.tagName.toLowerCase();const isSVG=tag==='svg'||el.querySelectorAll('svg').length>0;const duration=isSVG ? .55 : .4;animate(el,{opacity:[0,1],y:[6,0]},{duration,delay:base+(i*.05),easing:EASE});});});}else{animate(all,{opacity:[0,1],y:[8,0]},{duration:.45,delay:stagger(.07,{start:.08}),easing:EASE});}}
window.__playSlide=playSlide;playSlide(0);}

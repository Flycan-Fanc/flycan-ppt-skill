<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为 PPT 标题 · Flycan 黑板手绘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* ============ 黑板 ============ */
    --board:#0B0B0B;
    --board-rgb:11,11,11;
    /* 粉笔颜色 */
    --chalk:#F5F5F5;
    --chalk-rgb:245,245,245;
    --chalk-yellow:#FFD54F;
    --chalk-yellow-rgb:255,213,79;
    --chalk-blue:#64B5F6;
    --chalk-blue-rgb:100,181,246;
    --chalk-pink:#F48FB1;
    --chalk-pink-rgb:244,143,177;
    --chalk-green:#81C784;
    --chalk-green-rgb:129,199,132;
    --chalk-orange:#FFB74D;
    --chalk-orange-rgb:255,183,77;
    --chalk-red:#EF5350;
    --chalk-red-rgb:239,83,80;
    --chalk-dim:#666666;

    /* 字体 */
    --handwrite:"ZCOOL XiaoWei","Ma Shan Zheng","Liu Jian Mao Cao",cursive;
    --sans:"Noto Sans SC",sans-serif;
    --mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--board);color:var(--chalk);font-family:var(--handwrite);-webkit-font-smoothing:antialiased}

  /* ============ 黑板纹理 ============ */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,.008) 3px, rgba(255,255,255,.008) 5px);opacity:.25}
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 60% 40%, transparent 40%, rgba(0,0,0,.3) 100%)}

  /* ============ Deck ============ */
  #deck{position:fixed;inset:0;width:10000vw;height:100vh;display:flex;flex-wrap:nowrap;transition:transform .9s cubic-bezier(.77,0,.175,1);z-index:10;will-change:transform}
  .slide{width:100vw;height:100vh;flex:0 0 100vw;position:relative;padding:6vh 7vw 8vh 7vw;display:flex;flex-direction:column;overflow:hidden;background:var(--board);color:var(--chalk)}

  /* ============ 粉笔颜色类 ============ */
  .chalk-yellow{color:var(--chalk-yellow)}
  .chalk-blue{color:var(--chalk-blue)}
  .chalk-pink{color:var(--chalk-pink)}
  .chalk-green{color:var(--chalk-green)}
  .chalk-orange{color:var(--chalk-orange)}
  .chalk-red{color:var(--chalk-red)}
  .chalk-dim{color:var(--chalk-dim)}
  .chalk-mark{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--chalk-dim);opacity:.5}

  /* ============ 排版 ============ */
  .chalk-title{
    font-family:var(--handwrite);
    font-weight:400;
    font-size:7vw;
    line-height:1.1;
    letter-spacing:.02em;
    color:var(--chalk);
  }
  .chalk-h1{
    font-family:var(--handwrite);
    font-weight:400;
    font-size:5.5vw;
    line-height:1.15;
    letter-spacing:.015em;
    color:var(--chalk);
  }
  .chalk-h2{
    font-family:var(--handwrite);
    font-weight:400;
    font-size:3.6vw;
    line-height:1.25;
    letter-spacing:.01em;
    color:var(--chalk);
  }
  .chalk-body{
    font-family:var(--sans);
    font-weight:300;
    font-size:max(15px,1.15vw);
    line-height:1.7;
    color:rgba(var(--chalk-rgb),.82);
  }
  .chalk-note{
    font-family:var(--handwrite);
    font-weight:400;
    font-size:max(14px,1.1vw);
    line-height:1.5;
    color:rgba(var(--chalk-rgb),.7);
  }
  .chalk-code{
    font-family:var(--mono);
    font-weight:300;
    font-size:max(11px,.82vw);
    line-height:1.5;
    color:rgba(var(--chalk-rgb),.75);
  }
  .chalk-label{
    font-family:var(--mono);
    font-size:9px;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:var(--chalk-dim);
    opacity:.5;
  }

  /* ============ 手绘框线 ============ */
  .chalk-box{border:2.5px solid rgba(var(--chalk-rgb),.35);padding:2vh 2.2vw;position:relative}
  .chalk-box.yellow{border-color:var(--chalk-yellow)}
  .chalk-box.blue{border-color:var(--chalk-blue)}
  .chalk-box.pink{border-color:var(--chalk-pink)}
  .chalk-box.green{border-color:var(--chalk-green)}
  .chalk-box.red{border-color:var(--chalk-red)}
  .chalk-box.dashed{border-style:dashed}
  .chalk-box.dotted{border-style:dotted}

  .chalk-underline{display:inline-block;padding-bottom:.3vh;border-bottom:2.5px solid var(--chalk-yellow)}
  .chalk-underline.blue{border-color:var(--chalk-blue)}
  .chalk-underline.pink{border-color:var(--chalk-pink)}
  .chalk-underline.green{border-color:var(--chalk-green)}
  .chalk-circle{display:inline-flex;align-items:center;justify-content:center;width:2.2em;height:2.2em;border-radius:50%;border:2.5px solid var(--chalk-yellow);font-family:var(--handwrite);font-size:max(13px,1vw)}

  /* ============ 手绘箭头 SVG ============ */
  .chalk-arrow{display:inline-block;width:4vw;height:2vh;vertical-align:middle;margin:0 .5vw;fill:none;stroke:var(--chalk-dim);stroke-width:2;stroke-linecap:round}
  .chalk-arrow.yellow{stroke:var(--chalk-yellow)}
  .chalk-arrow.blue{stroke:var(--chalk-blue)}
  .chalk-arrow.green{stroke:var(--chalk-green)}

  /* ============ 火柴人 SVG ============ */
  .stickman{display:inline-block;width:3.5vw;height:7vw;vertical-align:middle;fill:none;stroke:var(--chalk);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .stickman.sm{width:2.5vw;height:5vw;stroke-width:2}
  .stickman.lg{width:5vw;height:10vw;stroke-width:3}

  /* ============ 布局工具 ============ */
  .frame{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .fill{flex:1}
  .center{align-items:center;justify-content:center;text-align:center}
  .col{display:flex;flex-direction:column;gap:1.8vh}
  .row{display:flex;align-items:center;gap:2vw;flex-wrap:wrap}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:3vw;flex:1;align-items:start}
  .split-7-5{display:grid;grid-template-columns:7fr 5fr;gap:2.5vw;align-items:start;flex:1}
  .split-6-6{display:grid;grid-template-columns:1fr 1fr;gap:2.5vw;align-items:start;flex:1}

  /* ============ 流程/推导 ============ */
  .flow-step{display:flex;flex-direction:column;gap:.6vh;padding:1.5vh 1.8vw;border-left:3px solid var(--chalk-yellow);background:rgba(var(--chalk-yellow-rgb),.04)}
  .flow-step.blue{border-color:var(--chalk-blue);background:rgba(var(--chalk-blue-rgb),.04)}
  .flow-step.green{border-color:var(--chalk-green);background:rgba(var(--chalk-green-rgb),.04)}
  .flow-step.pink{border-color:var(--chalk-pink);background:rgba(var(--chalk-pink-rgb),.04)}
  .flow-step .step-label{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--chalk-dim);opacity:.7}
  .flow-step .step-body{font-family:var(--handwrite);font-weight:400;font-size:max(15px,1.2vw);line-height:1.4;color:var(--chalk)}

  /* ============ 思维导图 ============ */
  .mind-map-center{text-align:center;padding:2.5vh 3vw;border:3px solid var(--chalk-yellow);display:inline-block;margin:0 auto 2.5vh auto;font-family:var(--handwrite);font-size:max(18px,1.6vw);background:rgba(var(--chalk-yellow-rgb),.05)}
  .mind-map-branches{display:flex;gap:1.5vw;justify-content:center;flex-wrap:wrap}
  .mind-map-branch{flex:1;min-width:0;border-top:2.5px dashed rgba(var(--chalk-rgb),.25);padding-top:1.5vh;text-align:center}
  .mind-map-branch .branch-label{font-family:var(--handwrite);font-size:max(14px,1.1vw);color:var(--chalk-yellow)}
  .mind-map-branch .branch-desc{font-family:var(--sans);font-weight:300;font-size:max(11px,.85vw);line-height:1.4;color:rgba(var(--chalk-rgb),.65);margin-top:.6vh}

  /* ============ 清单 ============ */
  .chalk-list{list-style:none;padding:0}
  .chalk-list li{padding:.8vh 0 .8vh 2.5vw;position:relative;font-family:var(--handwrite);font-size:max(16px,1.25vw);line-height:1.4;color:var(--chalk)}
  .chalk-list li::before{content:"";position:absolute;left:.3vw;top:1.4vh;width:.6vw;height:.6vw;border:2px solid var(--chalk-yellow)}
  .chalk-list li.done::before{content:"✓";border:none;font-size:1.2vw;color:var(--chalk-green);top:.8vh}

  /* ============ 对比标注 ============ */
  .vs-badge{display:inline-flex;align-items:center;justify-content:center;font-family:var(--handwrite);font-size:2vw;color:var(--chalk-yellow);padding:0 1vw}

  /* ============ 底部页码 ============ */
  .chalk-foot{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;font-family:var(--mono);font-size:10px;color:var(--chalk-dim);opacity:.4;padding-top:1.5vh;letter-spacing:.12em}

  /* ============ Navigation ============ */
  #nav{position:fixed;left:50%;bottom:2vh;transform:translateX(-50%);z-index:30;display:flex;gap:6px;padding:4px 8px;background:rgba(255,255,255,.06)}
  #nav .dot{width:5px;height:5px;background:rgba(255,255,255,.15);cursor:pointer;transition:all .3s;border:0;padding:0}
  #nav .dot.active{background:var(--chalk-yellow);width:14px}
  #hint{position:fixed;bottom:2.4vh;right:2.4vw;z-index:30;font-family:var(--mono);font-size:8px;letter-spacing:.2em;color:var(--chalk-dim);opacity:.25}
  body.low-power #hint{opacity:.5;color:var(--chalk-yellow)}

  /* ============ Animation ============ */
  [data-anim]{opacity:1}
  body.motion-ready [data-anim]{opacity:0;transform:translateY(0)}
  body.motion-ready [data-anim="fade"]{opacity:0;transform:none}
  body.motion-ready [data-anim="left"]{transform:translateX(-25px)}
  body.motion-ready [data-anim="right"]{transform:translateX(25px)}
  body.low-power #deck{transition:none!important}
  body.low-power *,body.low-power *::before,body.low-power *::after{animation:none!important;transition:none!important}
  body.low-power.motion-ready [data-anim],body.low-power [data-anim]{opacity:1!important;transform:none!important}

  @media (max-width:900px){
    .chalk-title{font-size:10vw}.chalk-h1{font-size:8vw}.chalk-h2{font-size:5.5vw}
    .split,.split-7-5,.split-6-6{grid-template-columns:1fr}
    .stickman{width:5vw;height:10vw}
  }
</style>
</head>
<body>
<script>
(function(){
  const KEY='flycan-board-low-power';
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stored=localStorage.getItem(KEY);
  window.__lowPowerMode=stored==='1'||(stored===null&&reduced);
  function updateHint(){const h=document.getElementById('hint');if(h)h.textContent=`← → · B ${window.__lowPowerMode?'动态':'静态'} · ESC`;}
  window.__setLowPowerMode=function(on,opts={}){window.__lowPowerMode=!!on;document.body.classList.toggle('low-power',window.__lowPowerMode);if(opts.persist!==false)localStorage.setItem(KEY,window.__lowPowerMode?'1':'0');if(window.__lowPowerMode&&document.getAnimations)document.getAnimations().forEach(a=>a.cancel());updateHint();if(window.__playSlide)window.__playSlide(window.__currentSlideIndex||0);};
  document.body.classList.toggle('low-power',window.__lowPowerMode);
  addEventListener('DOMContentLoaded',updateHint,{once:true});
})();
</script>

<div id="hint">← → · B 静态 · ESC</div>

<div id="deck">

<!-- ============================================================
     SLIDES 插入区
     布局参考 references/layouts-blackboard.md
     ============================================================ -->

<!-- SLIDES_HERE -->

</div>

<div id="nav"></div>

<script>
const deck=document.getElementById('deck');
const slides=deck.querySelectorAll('.slide');
const nav=document.getElementById('nav');
let idx=0,total=slides.length,lock=false;
deck.style.width=(total*100)+'vw';
slides.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='dot';b.dataset.i=i;b.setAttribute('aria-label','Page '+(i+1));
  b.onclick=()=>go(i);
  nav.appendChild(b);
});
function go(n){
  if(lock)return;
  idx=Math.max(0,Math.min(total-1,n));
  window.__currentSlideIndex=idx;
  deck.style.transform=`translateX(${-idx*100}vw)`;
  nav.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  if(window.__playSlide)setTimeout(()=>window.__playSlide(idx),450);
  lock=true;setTimeout(()=>lock=false,700);
}
let overviewOn=false;
const ov=document.createElement('div');
ov.id='overview';ov.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.95);backdrop-filter:blur(8px);display:none;overflow-y:auto;padding:3vh 4vw';
document.body.appendChild(ov);
function buildOverview(){
  ov.innerHTML='';const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:2vh 1.6vw;max-width:90vw;margin:0 auto';
  slides.forEach((s,i)=>{const c=document.createElement('div');c.style.cssText='cursor:pointer;overflow:hidden;border:2px solid '+(i===idx?'var(--chalk-yellow)':'rgba(255,255,255,.1)');const w=document.createElement('div');w.style.cssText='width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;pointer-events:none;background:var(--board)';const cl=s.cloneNode(true);cl.style.cssText='width:100vw;height:100vh;transform:scale('+(1/4.5)+');transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none';w.appendChild(cl);const l=document.createElement('div');l.style.cssText='padding:5px 8px;font-family:var(--mono);font-size:9px;color:var(--chalk-dim)';l.textContent=(i+1)+' / '+total;c.appendChild(w);c.appendChild(l);c.onclick=()=>{toggleOverview();go(i)};grid.appendChild(c);});
  ov.appendChild(grid);
}
function toggleOverview(){overviewOn=!overviewOn;if(overviewOn){buildOverview();ov.style.display='block';}else{ov.style.display='none';}}
addEventListener('keydown',e=>{
  if(e.key==='Escape'){e.preventDefault();toggleOverview();return;}
  if(e.key&&e.key.toLowerCase()==='b'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){e.preventDefault();window.__setLowPowerMode(!window.__lowPowerMode);return;}
  if(overviewOn)return;
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '||e.key==='ArrowDown'){if(window.__pipeAdvance&&window.__pipeAdvance())return;go(idx+1);return;}
  if(e.key==='ArrowLeft'||e.key==='PageUp'||e.key==='ArrowUp')go(idx-1);
  if(e.key==='Home')go(0);if(e.key==='End')go(total-1);
});
let wheelTO=null,wheelAcc=0;
addEventListener('wheel',e=>{wheelAcc+=e.deltaY+e.deltaX;if(Math.abs(wheelAcc)>50){if(wheelAcc>0&&window.__pipeAdvance&&window.__pipeAdvance()){wheelAcc=0;}else{go(idx+(wheelAcc>0?1:-1));wheelAcc=0;}}clearTimeout(wheelTO);wheelTO=setTimeout(()=>wheelAcc=0,150);},{passive:true});
let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;const dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){if(dx<0&&window.__pipeAdvance&&window.__pipeAdvance())return;go(idx+(dx<0?1:-1));}},{passive:true});
go(0);
</script>

<script type="module">
let motion;
try{motion=await import('./assets/motion.min.js');}catch(e1){try{motion=await import('https://cdn.jsdelivr.net/npm/motion@11.11.17/+esm');}catch(e2){console.warn('[motion] failed',e1,e2);document.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none'});}}
if(motion){const{animate,stagger}=motion;document.body.classList.add('motion-ready');const EASE=[.22,1,.36,1];const slides=[...document.querySelectorAll('.slide')];let lastIdx=-1;
function resetAnims(s){s.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='';el.style.transform='';});}
function revealStatic(s){resetAnims(s);document.getAnimations?.().forEach(a=>a.cancel());s.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none';});}
function playSlide(i){const slide=slides[i];if(!slide)return;lastIdx=i;if(window.__lowPowerMode){revealStatic(slide);return;}resetAnims(slide);const all=[...slide.querySelectorAll('[data-anim]')];if(!all.length)return;const groups=[];let cur=[];all.forEach(el=>{if(el.dataset.anim==='step'){if(cur.length)groups.push(cur);groups.push([el]);cur=[];}else{cur.push(el);}});if(cur.length)groups.push(cur);if(groups.length){let delay=0;groups.forEach((g,i)=>{const base=i*.25;g.forEach(el=>{const tag=el.tagName;const dur=tag==='svg'||tag==='path'?.5:.4;animate(el,{opacity:[0,1],y:[6,0]},{duration:dur,delay:base+(i*.05),easing:EASE});});});}else{animate(all,{opacity:[0,1],y:[8,0]},{duration:.5,delay:stagger(.08,{start:.1}),easing:EASE});}}
window.__playSlide=playSlide;playSlide(0);}
</script>
</body>

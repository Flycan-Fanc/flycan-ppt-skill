<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为 PPT 标题 · Flycan 黑板手绘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ========== 黑板基础 ========== */
  :root{
    --board:#202321;
    --board-rgb:32,35,33;
    --chalk:#F5F5F5;
    --chalk-rgb:245,245,245;
    --chalk-yellow:#FFD54F;
    --chalk-yellow-rgb:255,213,79;
    --chalk-blue:#64B5F6;
    --chalk-blue-rgb:100,181,246;
    --chalk-pink:#F48FB1;
    --chalk-pink-rgb:244,143,177;
    --chalk-green:#81C784;
    --chalk-green-rgb:129,199,132;
    --chalk-orange:#FFB74D;
    --chalk-orange-rgb:255,183,77;
    --chalk-red:#EF5350;
    --chalk-red-rgb:239,83,80;
    --chalk-dim:rgba(245,245,245,.35);
    --chalk-glow-white:0 0 10px rgba(245,245,245,.12);
    --chalk-glow-yellow:0 0 10px rgba(255,213,79,.12);
    --chalk-glow-blue:0 0 10px rgba(100,181,246,.1);
    --chalk-glow-pink:0 0 10px rgba(244,143,177,.1);
    --title:"ZCOOL XiaoWei",cursive;
    --handwrite:"Ma Shan Zheng",cursive;
    --sans:"Noto Sans SC","PingFang SC",sans-serif;
    --mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--board);color:var(--chalk);font-family:var(--title);-webkit-font-smoothing:antialiased}

  /* ========== 黑板纹理层 ========== */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse at 22% 18%, rgba(255,255,255,.025) 0%, transparent 40%),
      radial-gradient(ellipse at 73% 58%, rgba(255,255,255,.018) 0%, transparent 35%),
      radial-gradient(ellipse at 48% 80%, rgba(255,255,255,.012) 0%, transparent 30%),
      radial-gradient(ellipse at 60% 25%, rgba(255,255,255,.008) 0%, transparent 20%),
      linear-gradient(90deg, transparent 15%, rgba(255,255,255,.005) 18%, transparent 22%, transparent 55%, rgba(255,255,255,.004) 58%, transparent 62%),
      linear-gradient(110deg, transparent 35%, rgba(255,255,255,.006) 37%, transparent 40%),
      repeating-linear-gradient(0deg, transparent 0px, transparent 5px, rgba(255,255,255,.003) 5px, rgba(255,255,255,.003) 6px);
  }

  /* ========== Deck ========== */
  #deck{position:fixed;inset:0;width:10000vw;height:100vh;display:flex;flex-wrap:nowrap;transition:transform .8s cubic-bezier(.77,0,.175,1);z-index:10;will-change:transform}
  .slide{width:100vw;height:100vh;flex:0 0 100vw;position:relative;padding:5vh 6vw 6vh 6vw;display:flex;flex-direction:column;overflow:hidden;background:var(--board);color:var(--chalk);z-index:1}

  /* ========== 粉笔颜色 ========== */
  .chalk-yellow{color:var(--chalk-yellow)}
  .chalk-blue{color:var(--chalk-blue)}
  .chalk-pink{color:var(--chalk-pink)}
  .chalk-green{color:var(--chalk-green)}
  .chalk-orange{color:var(--chalk-orange)}
  .chalk-red{color:var(--chalk-red)}
  .chalk-dim{color:var(--chalk-dim)}

  /* ========== 粉笔字体层级 ==========
     不同层级 = 不同粗细的"粉笔"
     .chalk-title  → 大粉笔（粗、厚、重）
     .chalk-h1     → 中粉笔（中等粗细）
     .chalk-h2     → 细粉笔（手写体，自然流畅）
     .chalk-body   → 极细粉笔（无衬线，结构清晰）
     .chalk-note   → 注释粉笔（手写注释感）
     .chalk-mono   → 等宽粉笔（代码/标签）
  */
  .chalk-title{
    font-family:var(--title);
    font-size:max(36px,6.5vw);
    line-height:1.12;
    letter-spacing:.04em;
    color:#FFF;
    text-shadow:0 0 12px rgba(255,255,255,.08),
                1.5px 1.5px 2px rgba(0,0,0,.55),
                -1px -1px 1.5px rgba(0,0,0,.35),
                .5px 0 3px rgba(255,255,255,.06);
  }
  .chalk-h1{
    font-family:var(--title);
    font-size:max(28px,4.8vw);
    line-height:1.18;
    letter-spacing:.025em;
    color:#FFF;
    text-shadow:0 0 8px rgba(255,255,255,.06),
                1px 1px 1.5px rgba(0,0,0,.5),
                -.5px -.5px 1px rgba(0,0,0,.3);
  }
  .chalk-h2{
    font-family:var(--handwrite);
    font-size:max(22px,3.2vw);
    line-height:1.3;
    letter-spacing:.015em;
    color:rgba(255,255,255,.9);
    text-shadow:0 0 6px rgba(255,255,255,.05),
                .5px .5px 1px rgba(0,0,0,.45);
  }
  .chalk-body{
    font-family:var(--sans);
    font-weight:300;
    font-size:max(14px,1.2vw);
    line-height:1.7;
    color:rgba(255,255,255,.82);
    text-shadow:0 0 4px rgba(255,255,255,.04),
                .3px .3px .5px rgba(0,0,0,.3);
  }
  .chalk-body-strong{
    font-family:var(--sans);
    font-weight:500;
    font-size:max(15px,1.3vw);
    line-height:1.6;
    color:rgba(255,255,255,.9);
    text-shadow:0 0 5px rgba(255,255,255,.05),
                .5px .5px 1px rgba(0,0,0,.4);
  }
  .chalk-note{
    font-family:var(--handwrite);
    font-size:max(15px,1.1vw);
    line-height:1.45;
    color:rgba(255,255,255,.7);
    text-shadow:0 0 3px rgba(255,255,255,.03);
  }
  .chalk-mono{
    font-family:var(--mono);
    font-weight:300;
    font-size:max(10px,.75vw);
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--chalk-dim);
  }

  /* ========== 粉笔手绘框 ========== */
  .chalk-box{border:2.5px solid rgba(245,245,245,.3);padding:2vh 2.2vw;position:relative;box-shadow:1px 1px 0 rgba(245,245,245,.06),-1px 0 0 rgba(245,245,245,.04)}
  .chalk-box.yellow{border-color:var(--chalk-yellow);box-shadow:1px 1px 0 rgba(255,213,79,.08),-1px 0 0 rgba(255,213,79,.05)}
  .chalk-box.blue{border-color:var(--chalk-blue)}
  .chalk-box.pink{border-color:var(--chalk-pink)}
  .chalk-box.green{border-color:var(--chalk-green)}
  .chalk-box.orange{border-color:var(--chalk-orange)}
  .chalk-box.red{border-color:var(--chalk-red)}
  .chalk-box.dashed{border-style:dashed}
  .chalk-box.dotted{border-style:dotted}
  .chalk-box.thick{border-width:4px}

  .chalk-underline{display:inline;padding-bottom:2px;border-bottom:2.5px solid var(--chalk-yellow);box-shadow:0 1px 0 rgba(255,213,79,.08)}
  .chalk-underline.blue{border-color:var(--chalk-blue)}
  .chalk-underline.pink{border-color:var(--chalk-pink)}
  .chalk-underline.green{border-color:var(--chalk-green)}

  .chalk-circle{display:inline-flex;align-items:center;justify-content:center;width:2.4em;height:2.4em;border-radius:50%;border:2.5px solid var(--chalk-yellow);font-family:var(--title);font-size:max(13px,1vw);text-shadow:0 0 5px rgba(255,213,79,.1)}

  /* ========== 手绘 SVG 元素 ========== */
  .chalk-arrow{display:inline-block;vertical-align:middle;margin:0 .4vw;fill:none;stroke:var(--chalk-dim);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-arrow.yellow{stroke:var(--chalk-yellow)}
  .chalk-arrow.blue{stroke:var(--chalk-blue)}
  .chalk-arrow.green{stroke:var(--chalk-green)}
  .chalk-arrow.pink{stroke:var(--chalk-pink)}

  .stickman{display:inline-block;vertical-align:middle;fill:none;stroke:var(--chalk);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .stickman.sm{width:2.5vw;height:5vw;stroke-width:2}
  .stickman.lg{width:5vw;height:10vw;stroke-width:3}
  .stickman.xl{width:7vw;height:14vw;stroke-width:3.5}
  .stickman.yellow{stroke:var(--chalk-yellow)}
  .stickman.blue{stroke:var(--chalk-blue)}
  .stickman.pink{stroke:var(--chalk-pink)}

  .chalk-lightbulb{display:inline-block;width:3vw;height:4.5vw;fill:none;stroke:var(--chalk-yellow);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
  .chalk-lightbulb.blue{stroke:var(--chalk-blue)}
  .chalk-lightbulb.pink{stroke:var(--chalk-pink)}

  .chalk-check{display:inline-block;width:1.8vw;height:1.8vw;fill:none;stroke:var(--chalk-green);stroke-width:3;stroke-linecap:round;stroke-linejoin:round}

  /* ========== 布局工具 ========== */
  .frame{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative;z-index:1}
  .fill{flex:1}
  .center{align-items:center;justify-content:center;text-align:center}
  .col{display:flex;flex-direction:column;gap:1.5vh}
  .row{display:flex;align-items:center;gap:1.5vw;flex-wrap:wrap}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:2.5vw;flex:1;align-items:start}
  .split-6-6{display:grid;grid-template-columns:1fr 1fr;gap:2vw;align-items:start;flex:1}
  .split-7-5{display:grid;grid-template-columns:7fr 5fr;gap:2vw;align-items:start;flex:1}
  .gap-sm{height:1.2vh}
  .gap-md{height:2.5vh}
  .gap-lg{height:4vh}

  /* ========== 推导流程 ========== */
  .flow-step{display:flex;flex-direction:column;gap:.5vh;padding:1.2vh 1.8vw;border-left:3.5px solid var(--chalk-yellow);position:relative}
  .flow-step::before{content:"";position:absolute;left:-3.5px;top:0;bottom:0;width:3.5px;background:var(--chalk-yellow);opacity:.3}
  .flow-step.blue{border-color:var(--chalk-blue)}.flow-step.blue::before{background:var(--chalk-blue)}
  .flow-step.green{border-color:var(--chalk-green)}.flow-step.green::before{background:var(--chalk-green)}
  .flow-step.pink{border-color:var(--chalk-pink)}.flow-step.pink::before{background:var(--chalk-pink)}
  .flow-step.orange{border-color:var(--chalk-orange)}.flow-step.orange::before{background:var(--chalk-orange)}
  .flow-step .step-label{font-family:var(--mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--chalk-dim)}
  .flow-step .step-body{font-family:var(--handwrite);font-size:max(16px,1.25vw);line-height:1.4;color:rgba(255,255,255,.9);text-shadow:0 0 5px rgba(255,255,255,.05)}
  .flow-step .step-body .highlight{color:var(--chalk-yellow);font-family:var(--handwrite);font-size:max(18px,1.35vw)}
  .flow-step .step-body .highlight.blue{color:var(--chalk-blue)}
  .flow-step .step-body .highlight.pink{color:var(--chalk-pink)}
  .flow-step .step-body .highlight.green{color:var(--chalk-green)}

  /* ========== 思维导图 ========== */
  .mind-map-center{text-align:center;padding:2vh 2.5vw;border:3px solid var(--chalk-yellow);display:inline-block;margin:0 auto 2vh auto;font-family:var(--title);font-size:max(18px,1.6vw);text-shadow:0 0 8px rgba(255,213,79,.1);box-shadow:1px 1px 0 rgba(255,213,79,.08)}
  .mind-map-branches{display:flex;gap:1.2vw;justify-content:center;flex-wrap:wrap}
  .mind-map-branch{flex:1;min-width:0;padding-top:1.2vh;text-align:center}
  .mind-map-branch .branch-line{width:80%;height:2.5px;margin:0 auto 1vh;background:rgba(245,245,245,.2);border-radius:2px}
  .mind-map-branch .branch-label{font-family:var(--handwrite);font-size:max(15px,1.15vw);color:var(--chalk-yellow);text-shadow:0 0 5px rgba(255,213,79,.08)}
  .mind-map-branch .branch-desc{font-family:var(--sans);font-weight:300;font-size:max(11px,.85vw);line-height:1.4;color:rgba(255,255,255,.6);margin-top:.5vh}

  /* ========== 清单 ========== */
  .chalk-list{list-style:none;padding:0}
  .chalk-list li{padding:.7vh 0 .7vh 2.8vw;position:relative;font-family:var(--handwrite);font-size:max(17px,1.25vw);line-height:1.35;color:var(--chalk);text-shadow:0 0 5px rgba(255,255,255,.06)}
  .chalk-list li::before{content:"";position:absolute;left:.3vw;top:1.2vh;width:.65vw;height:.65vw;border:2.5px solid var(--chalk-yellow);transform:rotate(3deg)}
  .chalk-list li.done::before{content:"✓";border:none;font-size:max(13px,1vw);color:var(--chalk-green);top:.5vh;left:.2vw;transform:none}

  /* ========== 对比标注 ========== */
  .vs-badge{display:inline-flex;align-items:center;justify-content:center;font-family:var(--title);font-size:max(24px,2.2vw);color:var(--chalk-yellow);padding:0 1vw;text-shadow:0 0 10px rgba(255,213,79,.12)}

  /* ========== 分隔装饰 ========== */
  .chalk-divider{height:2px;background:rgba(245,245,245,.12);position:relative}
  .chalk-divider::after{content:"";position:absolute;left:0;top:-1px;width:100%;height:1px;background:rgba(245,245,245,.06)}

  /* ========== 大数字/重点标注 ========== */
  .chalk-big-num{font-family:var(--title);font-size:max(48px,7vw);line-height:1;color:var(--chalk-yellow);text-shadow:0 0 15px rgba(255,213,79,.12);display:inline-block}
  .chalk-stat-label{font-family:var(--sans);font-weight:300;font-size:max(12px,.9vw);color:var(--chalk-dim)}

  /* ========== 底部页码/脚注 ========== */
  .chalk-foot{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;font-family:var(--mono);font-size:max(8px,.55vw);color:var(--chalk-dim);opacity:.6;padding-top:2vh;letter-spacing:.15em;position:relative;z-index:1}

  /* ========== Navigation ========== */
  #nav{position:fixed;left:50%;bottom:2.5vh;transform:translateX(-50%);z-index:30;display:flex;gap:6px;padding:4px 8px}
  #nav .dot{width:5px;height:5px;background:rgba(245,245,245,.15);cursor:pointer;transition:all .3s;border:0;padding:0;transform:rotate(45deg)}
  #nav .dot.active{background:var(--chalk-yellow);width:14px;height:5px;transform:rotate(0)}
  #hint{position:fixed;bottom:2.8vh;right:2.8vw;z-index:30;font-family:var(--mono);font-size:max(7px,.5vw);letter-spacing:.25em;color:var(--chalk-dim);opacity:.3}
  body.low-power #hint{opacity:.6;color:var(--chalk-yellow)}

  /* ========== Animation ========== */
  [data-anim]{opacity:1}
  body.motion-ready [data-anim]{opacity:0;transform:translateY(0)}
  body.motion-ready [data-anim="fade"]{opacity:0;transform:none}
  body.motion-ready [data-anim="left"]{transform:translateX(-3vw)}
  body.motion-ready [data-anim="right"]{transform:translateX(3vw)}
  body.low-power #deck{transition:none!important}
  body.low-power *,body.low-power *::before,body.low-power *::after{animation:none!important;transition:none!important}
  body.low-power.motion-ready [data-anim],body.low-power [data-anim]{opacity:1!important;transform:none!important}

  @media (max-width:900px){
    .chalk-title{font-size:10vw}.chalk-h1{font-size:8vw}.chalk-h2{font-size:5.5vw}
    .split,.split-6-6,.split-7-5{grid-template-columns:1fr}
    .stickman{width:5vw;height:10vw}.stickman.lg{width:8vw;height:16vw}
    .slide{padding:3vh 4vw 8vh 4vw}
    .chalk-lightbulb{width:5vw;height:7.5vw}
    .chalk-check{width:3vw;height:3vw}
  }
</style>

<script>
(function(){
  const KEY='flycan-board-low-power';
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stored=localStorage.getItem(KEY);
  window.__lowPowerMode=stored==='1'||(stored===null&&reduced);
  function updateHint(){const h=document.getElementById('hint');if(h)h.textContent=`← → · B ${window.__lowPowerMode?'静态':'动态'} · ESC`;}
  window.__setLowPowerMode=function(on,opts={}){window.__lowPowerMode=!!on;document.body.classList.toggle('low-power',window.__lowPowerMode);if(opts.persist!==false)localStorage.setItem(KEY,window.__lowPowerMode?'1':'0');if(window.__lowPowerMode&&document.getAnimations)document.getAnimations().forEach(a=>a.cancel());updateHint();if(window.__playSlide)window.__playSlide(window.__currentSlideIndex||0);};
  document.body.classList.toggle('low-power',window.__lowPowerMode);
  addEventListener('DOMContentLoaded',updateHint,{once:true});
})();
</script>

<div id="nav"></div>

<script>
const deck=document.getElementById('deck');
const slides=deck.querySelectorAll('.slide');
const nav=document.getElementById('nav');
let idx=0,total=slides.length,lock=false;
deck.style.width=(total*100)+'vw';
slides.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='dot';b.dataset.i=i;b.setAttribute('aria-label','Page '+(i+1));
  b.onclick=()=>go(i);
  nav.appendChild(b);
});
function go(n){
  if(lock)return;
  idx=Math.max(0,Math.min(total-1,n));
  window.__currentSlideIndex=idx;
  deck.style.transform=`translateX(${-idx*100}vw)`;
  nav.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  if(window.__playSlide)setTimeout(()=>window.__playSlide(idx),450);
  lock=true;setTimeout(()=>lock=false,700);
}
let overviewOn=false;
const ov=document.createElement('div');
ov.id='overview';ov.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.95);backdrop-filter:blur(8px);display:none;overflow-y:auto;padding:3vh 4vw';
document.body.appendChild(ov);
function buildOverview(){
  ov.innerHTML='';const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:2vh 1.6vw;max-width:90vw;margin:0 auto';
  slides.forEach((s,i)=>{const c=document.createElement('div');c.style.cssText='cursor:pointer;overflow:hidden;border:2px solid '+(i===idx?'var(--chalk-yellow)':'rgba(255,255,255,.08)');const w=document.createElement('div');w.style.cssText='width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;pointer-events:none;background:var(--board)';const cl=s.cloneNode(true);cl.style.cssText='width:100vw;height:100vh;transform:scale('+(1/4.5)+');transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none';w.appendChild(cl);const l=document.createElement('div');l.style.cssText='padding:5px 8px;font-family:var(--mono);font-size:8px;color:var(--chalk-dim)';l.textContent=(i+1)+' / '+total;c.appendChild(w);c.appendChild(l);c.onclick=()=>{toggleOverview();go(i)};grid.appendChild(c);});
  ov.appendChild(grid);
}
function toggleOverview(){overviewOn=!overviewOn;if(overviewOn){buildOverview();ov.style.display='block';}else{ov.style.display='none';}}
addEventListener('keydown',e=>{
  if(e.key==='Escape'){e.preventDefault();toggleOverview();return;}
  if(e.key&&e.key.toLowerCase()==='b'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){e.preventDefault();window.__setLowPowerMode(!window.__lowPowerMode);return;}
  if(overviewOn)return;
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '||e.key==='ArrowDown'){if(window.__pipeAdvance&&window.__pipeAdvance())return;go(idx+1);return;}
  if(e.key==='ArrowLeft'||e.key==='PageUp'||e.key==='ArrowUp')go(idx-1);
  if(e.key==='Home')go(0);if(e.key==='End')go(total-1);
});
let wheelTO=null,wheelAcc=0;
addEventListener('wheel',e=>{wheelAcc+=e.deltaY+e.deltaX;if(Math.abs(wheelAcc)>50){if(wheelAcc>0&&window.__pipeAdvance&&window.__pipeAdvance()){wheelAcc=0;}else{go(idx+(wheelAcc>0?1:-1));wheelAcc=0;}}clearTimeout(wheelTO);wheelTO=setTimeout(()=>wheelAcc=0,150);},{passive:true});
let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;const dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){if(dx<0&&window.__pipeAdvance&&window.__pipeAdvance())return;go(idx+(dx<0?1:-1));}},{passive:true});
go(0);
</script>

<script type="module">
let motion;
try{motion=await import('./assets/motion.min.js');}catch(e1){try{motion=await import('https://cdn.jsdelivr.net/npm/motion@11.11.17/+esm');}catch(e2){console.warn('[motion] failed',e1,e2);document.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none'});}}
if(motion){const{animate,stagger}=motion;document.body.classList.add('motion-ready');const EASE=[.22,1,.36,1];const slides=[...document.querySelectorAll('.slide')];let lastIdx=-1;
function resetAnims(s){s.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='';el.style.transform='';});}
function revealStatic(s){resetAnims(s);document.getAnimations?.().forEach(a=>a.cancel());s.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none';});}
function playSlide(i){const slide=slides[i];if(!slide)return;lastIdx=i;if(window.__lowPowerMode){revealStatic(slide);return;}resetAnims(slide);const all=[...slide.querySelectorAll('[data-anim]')];if(!all.length)return;const groups=[];let cur=[];all.forEach(el=>{if(el.dataset.anim==='step'){if(cur.length)groups.push(cur);groups.push([el]);cur=[];}else{cur.push(el);}});if(cur.length)groups.push(cur);if(groups.length){groups.forEach((g,i)=>{const base=i*.25;g.forEach(el=>{const tag=el.tagName.toLowerCase();const isSVG=tag==='svg'||el.querySelectorAll('svg').length>0;const duration=isSVG?.55:.4;animate(el,{opacity:[0,1],y:[6,0]},{duration,delay:base+(i*.05),easing:EASE});});});}else{animate(all,{opacity:[0,1],y:[8,0]},{duration:.45,delay:stagger(.07,{start:.08}),easing:EASE});}}
window.__playSlide=playSlide;playSlide(0);}
</script>

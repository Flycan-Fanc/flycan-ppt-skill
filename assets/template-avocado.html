<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    /* ============ 主题色(默认:🥑 牛油果) ============
       切换主题:从 references/themes-avocado.md 复制对应的 :root 块
       整体替换这几行 */
    --primary:#A8C686;
    --primary-rgb:168,198,134;
    --primary-light:#DDE5B6;
    --primary-light-rgb:221,229,182;
    --primary-mid:#BBCF9A;
    --primary-mid-rgb:187,207,154;
    --paper:#FAF9F6;
    --paper-rgb:250,249,246;
    --paper-alt:#E8F3E8;
    --paper-alt-rgb:232,243,232;
    --ink:#2C3A2A;
    --ink-rgb:44,58,42;
    --ink-soft:#5A6B58;
    --ink-soft-rgb:90,107,88;
    --ink-light:#8A9E88;

    /* ============ 字体 ============ */
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --serif-en:"Playfair Display","Source Serif 4",Georgia,serif;
    --serif-body-en:"Source Serif 4",Georgia,serif;
    --serif-zh:"Noto Serif SC",source-han-serif-sc,serif;
    --sans-zh:"Noto Sans SC",source-han-sans-sc,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);color:var(--paper);font-family:var(--sans-zh);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

  /* ============ 背景纹理（极淡水彩感） ============ */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 30% 20%, rgba(var(--primary-rgb),.06) 0%, transparent 60%),radial-gradient(ellipse at 70% 80%, rgba(var(--primary-light-rgb),.08) 0%, transparent 50%);transition:background 1s ease}

  /* ============ Deck 容器 + 翻页 ============ */
  #deck{position:fixed;inset:0;width:10000vw;height:100vh;display:flex;flex-wrap:nowrap;transition:transform .9s cubic-bezier(.77,0,.175,1);z-index:10;will-change:transform}
  .slide{width:100vw;height:100vh;flex:0 0 100vw;position:relative;padding:5vh 6vw 10vh 6vw;display:flex;flex-direction:column;overflow:hidden}
  .slide.light{color:var(--ink);background:var(--paper)}
  .slide.dark{color:var(--paper);background:var(--ink)}
  .slide.hero.light{background:linear-gradient(180deg, var(--paper) 0%, var(--paper-alt) 100%)}
  .slide.hero.dark{background:linear-gradient(180deg, var(--ink) 0%, #1a2818 100%)}

  /* 遮罩 */
  .slide::before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none}
  .slide.light::before{background:rgba(var(--paper-rgb),.92);backdrop-filter:blur(2px)}
  .slide.dark::before{background:rgba(44,58,42,.88);backdrop-filter:blur(2px)}
  .slide.hero.light::before{background:rgba(var(--paper-rgb),.2);backdrop-filter:none}
  .slide.hero.dark::before{background:rgba(44,58,42,.15);backdrop-filter:none}

  /* ============ Chrome + Foot ============ */
  .chrome{display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.55}
  .foot{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;opacity:.45;padding-top:2vh;border-top:1px solid currentColor;border-color:rgba(127,127,127,.2)}
  .foot .title{font-family:var(--serif-zh);font-weight:400;letter-spacing:.05em;text-transform:none;opacity:.65;font-size:12px}

  .tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;padding:5px 12px;border:1px solid currentColor;opacity:.8}
  .rule{width:100%;height:1px;background:currentColor;opacity:.18;margin:2.5vh 0}

  /* ============ 字体规则 ============ */
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;opacity:.55;margin-bottom:2.4vh;color:var(--primary)}
  .display{font-family:var(--serif-en);font-weight:700;font-size:11vw;line-height:.92;letter-spacing:-.025em}
  .display-zh{font-family:var(--serif-zh);font-weight:700;font-size:7.8vw;line-height:1.04;letter-spacing:-.005em}
  .body-zh{font-family:var(--sans-zh);font-weight:400;font-size:max(14px,1.18vw);line-height:1.75;opacity:.82;letter-spacing:.01em}
  .body-serif{font-family:var(--serif-zh);font-weight:400;font-size:max(14px,1.25vw);line-height:1.65;opacity:.85}
  .lead{font-family:var(--serif-zh);font-weight:400;font-size:1.8vw;line-height:1.45;opacity:.82}
  .meta{font-family:var(--mono);font-size:max(10px,.82vw);letter-spacing:.18em;text-transform:uppercase;opacity:.55}
  .meta-row{display:flex;gap:1.2em;align-items:baseline;flex-wrap:wrap;font-family:var(--mono);font-size:max(11px,.88vw);letter-spacing:.16em;text-transform:uppercase;opacity:.55}
  .big-num{font-family:var(--serif-en);font-weight:800;font-size:10vw;line-height:.85;letter-spacing:-.03em;font-feature-settings:"tnum"}
  .en{font-family:var(--serif-en);font-style:italic;font-weight:500}
  em{font-style:italic;font-family:var(--serif-en)}

  /* ============ 布局工具 ============ */
  .col{display:flex;flex-direction:column;gap:2vh}
  .row{display:flex;align-items:center;gap:2.5vw}
  .grid-6{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:3.5vw 5vw;flex:1;align-content:center;padding:2vh 0}
  .grid-4{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:3.5vh 5vw;flex:1;align-content:center}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:3.5vw;flex:1;align-content:center}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:4vw;flex:1;align-items:center}
  .fill{flex:1}
  .center{align-items:center;justify-content:center;text-align:center}

  /* ============ 标题层级 ============ */
  .h-hero{
    font-family:var(--serif-zh);
    font-weight:900;
    font-size:10vw;
    line-height:.96;
    letter-spacing:-.02em;
  }
  .h-xl{
    font-family:var(--serif-zh);
    font-weight:700;
    font-size:5.8vw;
    line-height:1.1;
    letter-spacing:-.01em;
  }
  .h-sub{
    font-family:var(--serif-zh);
    font-weight:500;
    font-size:2.8vw;
    line-height:1.3;
    letter-spacing:0;
    opacity:.75;
  }
  .h-md{
    font-family:var(--serif-zh);
    font-weight:600;
    font-size:2.1vw;
    line-height:1.3;
  }

  .lead{font-family:var(--serif-zh);font-weight:400;font-size:1.65vw;line-height:1.5;opacity:.86}

  /* ============ 扩展网格 ============ */
  .frame{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .grid-2-7-5{display:grid;grid-template-columns:7fr 5fr;gap:3vw 4vh;align-items:start}
  .grid-2-6-6{display:grid;grid-template-columns:1fr 1fr;gap:3vw 4vh;align-items:start}
  .grid-2-8-4{display:grid;grid-template-columns:8fr 4fr;gap:3vw 4vh;align-items:start}

  /* ============ Stat Card ============ */
  .stat-card{display:flex;flex-direction:column;gap:.8vh;align-items:flex-start;padding-top:1.4vh;border-top:2px solid var(--primary)}
  .stat-card .stat-label{font-family:var(--mono);font-size:max(9px,.72vw);letter-spacing:.26em;text-transform:uppercase;opacity:.5}
  .stat-card .stat-nb{font-family:var(--serif-en);font-weight:800;font-size:5.2vw;line-height:.9;letter-spacing:-.03em;font-feature-settings:"tnum";margin-top:.4vh;color:var(--primary)}
  .stat-card .stat-nb .stat-unit{font-family:var(--serif-zh);font-weight:500;font-size:.38em;letter-spacing:0;opacity:.68;margin-left:.14em}
  .stat-card .stat-note{font-family:var(--sans-zh);font-weight:400;font-size:max(12px,1vw);line-height:1.5;opacity:.68;margin-top:.6vh}

  /* ============ Callout ============ */
  .callout{padding:2.5vh 2.2vw;border-left:3px solid var(--primary);position:relative;font-family:var(--serif-zh);font-size:max(14px,1.15vw);line-height:1.55;opacity:.9}
  .slide.light .callout{background:rgba(var(--primary-rgb),.06)}
  .slide.dark .callout{background:rgba(255,255,255,.05)}
  .callout .cite,.callout-src{display:block;margin-top:1.4vh;font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;opacity:.55}

  /* ============ Pipeline ============ */
  .pipeline-section{margin-top:3.6vh;padding-top:2.4vh;border-top:1px dashed rgba(127,127,127,.28)}
  .pipeline-section:first-of-type{border-top:0;padding-top:0;margin-top:2.4vh}
  .pipeline-label{font-family:var(--mono);font-size:max(10px,.8vw);letter-spacing:.26em;text-transform:uppercase;opacity:.58;margin-bottom:2vh}
  .pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:1.2vw}
  .pipeline[data-cols="3"]{grid-template-columns:repeat(3,1fr)}
  .pipeline[data-cols="4"]{grid-template-columns:repeat(4,1fr)}
  .pipeline[data-cols="6"]{grid-template-columns:repeat(6,1fr)}
  .step{display:flex;flex-direction:column;gap:.6vh;padding-top:1.2vh;border-top:1px solid currentColor;border-color:rgba(127,127,127,.3)}
  .step-nb{font-family:var(--mono);font-weight:500;font-size:1vw;opacity:.4}
  .step-title{font-family:var(--sans-zh);font-weight:700;font-size:1.4vw;letter-spacing:.01em;line-height:1.2}
  .step-desc{font-family:var(--sans-zh);font-weight:400;font-size:max(11px,.9vw);line-height:1.45;opacity:.68}

  /* ============ Image ============ */
  .frame-img{overflow:hidden;position:relative;background:rgba(0,0,0,.03);box-sizing:border-box;width:100%;border-radius:6px}
  .slide.dark .frame-img{background:rgba(255,255,255,.04)}
  .frame-img > img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
  .frame-img.fit-contain > img{object-fit:contain;object-position:center center}
  .frame-img.r-16x9{aspect-ratio:16/9;max-height:60vh}
  .frame-img.r-16x10{aspect-ratio:16/10;max-height:52vh}
  .frame-img.r-4x3{aspect-ratio:4/3;max-height:52vh}
  .frame-img.r-3x2{aspect-ratio:3/2;max-height:42vh}
  .frame-img.r-3x4{aspect-ratio:3/4;max-height:56vh}
  .frame-img.r-1x1{aspect-ratio:1/1;max-height:46vh}
  .frame-img.h-22{height:22vh}
  .frame-img.h-26{height:26vh}
  .img-cap{display:block;margin-top:.6vh;font-family:var(--mono);font-size:max(9px,.75vw);letter-spacing:.24em;text-transform:uppercase;opacity:.55}
  figure.frame-img{margin:0;display:flex;flex-direction:column;min-width:0}
  figure.tile > .frame-img{flex:0 0 auto}

  /* ============ Icons ============ */
  .ico{width:1em;height:1em;display:inline-block;vertical-align:-.12em;stroke:currentColor;fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .ico-md{width:1.6vw;height:1.6vw;stroke-width:1.3;display:inline-block;vertical-align:-.35em}

  /* ============ Navigation ============ */
  #nav{position:fixed;left:50%;bottom:2.4vh;transform:translateX(-50%);z-index:30;display:flex;gap:10px;padding:6px 12px;border-radius:999px;background:rgba(0,0,0,.12);backdrop-filter:blur(8px)}
  #nav .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);cursor:pointer;transition:all .3s ease;border:0;padding:0}
  #nav .dot:hover{background:rgba(255,255,255,.45);transform:scale(1.15)}
  #nav .dot.active{background:var(--primary);width:20px;border-radius:999px}
  body.light-bg #nav{background:rgba(0,0,0,.08)}
  body.light-bg #nav .dot{background:rgba(var(--ink-rgb),.2)}
  body.light-bg #nav .dot.active{background:var(--primary)}
  #hint{position:fixed;bottom:2.8vh;right:2.8vw;z-index:30;font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;opacity:.35;mix-blend-mode:difference;color:#aaa}
  body.low-power #hint{opacity:.65;color:var(--primary);mix-blend-mode:normal}

  /* ============ Motion / Animation ============ */
  [data-anim]{opacity:1}
  body.motion-ready [data-anim]{opacity:0;transform:translateY(0)}
  body.motion-ready [data-anim="left"]{transform:translateX(-20px)}
  body.motion-ready [data-anim="right"]{transform:translateX(20px)}
  body.motion-ready [data-anim="line"]{opacity:0;transform:translateY(8px)}
  body.motion-ready [data-animate="pipeline"] [data-anim]{opacity:.15}
  body.low-power #deck{transition:none!important}
  body.low-power *,
  body.low-power *::before,
  body.low-power *::after{animation:none!important;transition:none!important}
  body.low-power.motion-ready [data-anim],
  body.low-power [data-anim]{opacity:1!important;transform:none!important}

  @media (max-width:900px){
    .h-hero{font-size:14vw}
    .h-xl{font-size:9vw}
    .h-sub{font-size:4.5vw}
    .lead{font-size:2.8vw}
    .pipeline{grid-template-columns:repeat(2,1fr)}
    .grid-2-7-5,.grid-2-6-6,.grid-2-8-4{grid-template-columns:1fr}
  }
</style>

<script>
  (function(){
    const KEY = 'ppt-avocado-low-power';
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const stored = localStorage.getItem(KEY);
    window.__lowPowerMode = stored === '1' || (stored === null && reduced);
    function updateHint(){
      const hint = document.getElementById('hint');
      if(hint) hint.textContent = `← → · B ${window.__lowPowerMode ? '动态' : '静态'} · ESC 索引`;
    }
    window.__setLowPowerMode = function(on, opts={}){
      window.__lowPowerMode = !!on;
      document.body.classList.toggle('low-power', window.__lowPowerMode);
      if(opts.persist !== false) localStorage.setItem(KEY, window.__lowPowerMode ? '1' : '0');
      if(window.__lowPowerMode && document.getAnimations){
        document.getAnimations().forEach(a=>a.cancel());
      }
      updateHint();
      dispatchEvent(new CustomEvent('ppt-low-power-change', {detail:{on:window.__lowPowerMode}}));
      if(window.__playSlide) window.__playSlide(window.__currentSlideIndex || 0);
    };
    document.body.classList.toggle('low-power', window.__lowPowerMode);
    addEventListener('DOMContentLoaded', updateHint, {once:true});
  })();
</script>

<script>
// =============== 导航 ===============
const deck=document.getElementById('deck');
const slides=deck.querySelectorAll('.slide');
const nav=document.getElementById('nav');
let idx=0,total=slides.length,lock=false;

deck.style.width=(total*100)+'vw';

slides.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='dot';b.dataset.i=i;b.setAttribute('aria-label','Page '+(i+1));
  b.onclick=()=>go(i);
  nav.appendChild(b);
});

function go(n){
  if(lock)return;
  idx=Math.max(0,Math.min(total-1,n));
  window.__currentSlideIndex = idx;
  deck.style.transform=`translateX(${-idx*100}vw)`;
  nav.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  const el=slides[idx];
  const th=el.classList.contains('light')?'light':'dark';
  document.body.classList.toggle('light-bg',th==='light');
  if(window.__playSlide) setTimeout(()=>window.__playSlide(idx), 450);
  lock=true;setTimeout(()=>lock=false,700);
}

// ESC 索引视图
let overviewOn=false;
const ov=document.createElement('div');
ov.id='overview';
ov.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(var(--paper-rgb),.95);backdrop-filter:blur(12px);display:none;overflow-y:auto;padding:4vh 4vw';
document.body.appendChild(ov);

function buildOverview(){
  ov.innerHTML='';
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:2vh 1.6vw;max-width:90vw;margin:0 auto';
  slides.forEach((s,i)=>{
    const card=document.createElement('div');
    card.style.cssText='cursor:pointer;border-radius:6px;overflow:hidden;border:2px solid '+(i===idx?'var(--primary)':'rgba(127,127,127,.2)')+';transition:border-color .2s';
    card.onmouseenter=()=>card.style.borderColor='var(--primary)';
    card.onmouseleave=()=>card.style.borderColor=i===idx?'var(--primary)':'rgba(127,127,127,.2)';
    const wrap=document.createElement('div');
    wrap.style.cssText='width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;pointer-events:none;background:'+(s.classList.contains('light')?'var(--paper)':'var(--ink)');
    const clone=s.cloneNode(true);
    clone.style.cssText='width:100vw;height:100vh;transform:scale('+(1/4.5)+');transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none';
    wrap.appendChild(clone);
    const label=document.createElement('div');
    label.style.cssText='padding:6px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);opacity:.65';
    label.textContent=(i+1)+' / '+total;
    card.appendChild(wrap);
    card.appendChild(label);
    card.onclick=()=>{toggleOverview();go(i)};
    grid.appendChild(card);
  });
  ov.appendChild(grid);
}

function toggleOverview(){
  overviewOn=!overviewOn;
  if(overviewOn){buildOverview();ov.style.display='block';}
  else{ov.style.display='none';}
}

addEventListener('keydown',e=>{
  if(e.key==='Escape'){e.preventDefault();toggleOverview();return;}
  if(e.key && e.key.toLowerCase()==='b' && !e.metaKey && !e.ctrlKey && !e.altKey){
    e.preventDefault();
    window.__setLowPowerMode(!window.__lowPowerMode);
    return;
  }
  if(overviewOn)return;
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '||e.key==='ArrowDown'){
    if(window.__pipeAdvance && window.__pipeAdvance()) return;
    go(idx+1);
    return;
  }
  if(e.key==='ArrowLeft'||e.key==='PageUp'||e.key==='ArrowUp')go(idx-1);
  if(e.key==='Home')go(0);
  if(e.key==='End')go(total-1);
});

let wheelTO=null,wheelAcc=0;
addEventListener('wheel',e=>{
  wheelAcc+=e.deltaY+e.deltaX;
  if(Math.abs(wheelAcc)>50){
    if(wheelAcc>0 && window.__pipeAdvance && window.__pipeAdvance()){
      wheelAcc=0;
    }else{
      go(idx+(wheelAcc>0?1:-1));wheelAcc=0;
    }
  }
  clearTimeout(wheelTO);wheelTO=setTimeout(()=>wheelAcc=0,150);
},{passive:true});

let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{
  const dx=(e.changedTouches[0].clientX-tx);
  const dy=(e.changedTouches[0].clientY-ty);
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
    if(dx<0 && window.__pipeAdvance && window.__pipeAdvance()) return;
    go(idx+(dx<0?1:-1));
  }
},{passive:true});

go(0);
</script>

<script type="module">
let motion;
try {
  motion = await import('./assets/motion.min.js');
} catch(e1) {
  try {
    motion = await import('https://cdn.jsdelivr.net/npm/motion@11.11.17/+esm');
  } catch(e2) {
    console.warn('[motion] failed', e1, e2);
    document.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none'});
    document.querySelectorAll('[data-animate="pipeline"] [data-anim]').forEach(el=>el.style.opacity='1');
  }
}

if(motion){
  const { animate, stagger } = motion;
  document.body.classList.add('motion-ready');
  const EASE = [.22, 1, .36, 1];
  const slides = [...document.querySelectorAll('.slide')];
  let pipeStep = -1;
  let lastIdx = -1;

  function resetAnims(slide){
    slide.querySelectorAll('[data-anim]').forEach(el=>{
      el.style.opacity='';
      el.style.transform='';
    });
  }

  function revealStatic(slide){
    resetAnims(slide);
    document.getAnimations?.().forEach(a=>a.cancel());
    slide.querySelectorAll('[data-anim]').forEach(el=>{
      el.style.opacity='1';
      el.style.transform='none';
    });
  }

  function playSlide(i){
    const slide = slides[i];
    if(!slide) return;
    lastIdx = i;
    const recipe = slide.dataset.animate || (slide.classList.contains('hero') ? 'hero' : 'cascade');

    if(window.__lowPowerMode){
      revealStatic(slide);
      return;
    }

    if(recipe === 'pipeline'){
      pipeStep = -1;
      slide.querySelectorAll('[data-anim]').forEach(el=>{
        el.style.opacity='0.15';
        el.style.transform='none';
      });
      return;
    }

    resetAnims(slide);
    const all = [...slide.querySelectorAll('[data-anim]')];
    if(!all.length) return;

    if(recipe === 'directional'){
      const lefts  = all.filter(el=>el.dataset.anim==='left');
      const rights = all.filter(el=>el.dataset.anim==='right');
      const others = all.filter(el=>!['left','right'].includes(el.dataset.anim));
      if(others.length) animate(others, {opacity:[0,1], y:[10,0]}, {duration:.6, delay:stagger(.1, {start:.15}), easing:EASE});
      if(lefts.length)  animate(lefts,  {opacity:[0,1], x:[-20,0]}, {duration:.7, delay:.3, easing:EASE});
      if(rights.length) animate(rights, {opacity:[0,1], x:[20,0]},  {duration:.7, delay:.9, easing:EASE});
      return;
    }

    if(recipe === 'quote'){
      const lines = all.filter(el=>el.dataset.anim==='line');
      const others = all.filter(el=>el.dataset.anim!=='line');
      if(others.length) animate(others, {opacity:[0,1], y:[8,0]},  {duration:.5, delay:stagger(.1, {start:.15}), easing:EASE});
      if(lines.length)  animate(lines,  {opacity:[.35,1], y:[8,0]}, {duration:.7, delay:stagger(.5, {start:.4}), easing:EASE});
      return;
    }

    if(recipe === 'hero'){
      animate(all, {opacity:[0,1], y:[14,0]}, {duration:.8, delay:stagger(.14, {start:.2}), easing:EASE});
      return;
    }

    // default cascade
    animate(all, {opacity:[0,1], y:[12,0]}, {duration:.6, delay:stagger(.08, {start:.12}), easing:EASE});
  }

  function pipeAdvance(){
    if(window.__lowPowerMode) return false;
    const slide = slides[lastIdx];
    if(!slide || slide.dataset.animate !== 'pipeline') return false;
    const steps = [...slide.querySelectorAll('[data-anim="step"]')];
    if(pipeStep >= steps.length - 1) return false;
    pipeStep++;
    animate(steps[pipeStep], {opacity:[0.15,1], y:[8,0]}, {duration:.4, easing:EASE});
    return true;
  }

  window.__playSlide = playSlide;
  window.__pipeAdvance = pipeAdvance;

  playSlide(0);
}
</script>

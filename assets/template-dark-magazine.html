<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为 PPT 标题 · Flycan 深绿杂志</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    /* 主题色可换 — 从 references/themes-dark-magazine.md 复制 */
    --accent:#7AADD9;
    --accent-rgb:122,173,217;
    --accent-light:#9DC3E8;
    --accent-mid:#5B8DB8;
    --bg:#1B2F1D;
    --bg-rgb:27,47,29;
    --surface:#233A25;
    --surface-rgb:35,58,37;
    --text:#F5F0E8;
    --text-rgb:245,240,232;
    --text-soft:#B8B0A0;
    --text-dim:#7A7568;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --serif-en:"Playfair Display","Source Serif 4",Georgia,serif;
    --serif-body-en:"Source Serif 4",Georgia,serif;
    --serif-zh:"Noto Serif SC",source-han-serif-sc,serif;
    --sans-zh:"Noto Sans SC",source-han-sans-sc,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans-zh);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 30% 20%, rgba(var(--accent-rgb),.05) 0%, transparent 60%),radial-gradient(ellipse at 70% 80%, rgba(var(--accent-rgb),.03) 0%, transparent 50%)}
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.008) 2px, rgba(255,255,255,.008) 4px);opacity:.3}

  #deck{position:fixed;inset:0;width:10000vw;height:100vh;display:flex;flex-wrap:nowrap;transition:transform .9s cubic-bezier(.77,0,.175,1);z-index:10;will-change:transform}
  .slide{width:100vw;height:100vh;flex:0 0 100vw;position:relative;padding:5vh 6vw 9vh 6vw;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--text)}
  .slide.hero{background:linear-gradient(180deg, var(--bg) 0%, #152917 100%)}
  .slide::before{content:"";position:absolute;inset:0;z-index:-1;pointer-events:none}
  .slide::before{background:rgba(var(--bg-rgb),.92);backdrop-filter:blur(2px)}
  .slide.hero::before{background:rgba(var(--bg-rgb),.15);backdrop-filter:none}

  /* Chrome + Foot — 杂志感 */
  .chrome{display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.5;color:var(--text-dim)}
  .foot{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;opacity:.45;color:var(--text-dim);padding-top:2vh;border-top:1px solid rgba(var(--text-rgb),.1)}
  .foot .title{font-family:var(--serif-zh);font-weight:400;letter-spacing:.05em;text-transform:none;opacity:.6;font-size:12px}
  .tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;padding:5px 12px;border:1px solid currentColor;opacity:.7}
  .rule{width:100%;height:1px;background:currentColor;opacity:.12;margin:2.5vh 0}

  /* Typography */
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;opacity:.55;margin-bottom:2.4vh;color:var(--accent)}
  .h-hero{font-family:var(--serif-zh);font-weight:900;font-size:9vw;line-height:.96;letter-spacing:-.02em;color:var(--text)}
  .h-xl{font-family:var(--serif-zh);font-weight:700;font-size:5.2vw;line-height:1.1;letter-spacing:-.01em;color:var(--text)}
  .h-sub{font-family:var(--serif-zh);font-weight:500;font-size:2.5vw;line-height:1.3;letter-spacing:0;opacity:.7;color:var(--accent)}
  .h-md{font-family:var(--serif-zh);font-weight:600;font-size:2vw;line-height:1.3;color:var(--text)}
  .lead{font-family:var(--serif-zh);font-weight:400;font-size:1.6vw;line-height:1.5;opacity:.86;color:var(--text)}
  .body-text{font-family:var(--sans-zh);font-weight:400;font-size:max(14px,1.05vw);line-height:1.7;color:rgba(var(--text-rgb),.82)}
  .meta{font-family:var(--mono);font-size:max(10px,.78vw);letter-spacing:.18em;text-transform:uppercase;opacity:.5;color:var(--text-dim)}
  .meta-row{display:flex;gap:1.2em;align-items:baseline;flex-wrap:wrap;font-family:var(--mono);font-size:max(11px,.88vw);letter-spacing:.16em;text-transform:uppercase;opacity:.55;color:var(--text-dim)}
  .display{font-family:var(--serif-en);font-weight:700;font-size:10vw;line-height:.92;letter-spacing:-.025em}
  .big-num{font-family:var(--serif-en);font-weight:800;font-size:8vw;line-height:.85;letter-spacing:-.03em;font-feature-settings:"tnum";color:var(--accent)}
  .accent{color:var(--accent)}

  /* Layout tools */
  .frame{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .fill{flex:1}
  .center{align-items:center;justify-content:center;text-align:center}
  .col{display:flex;flex-direction:column;gap:2vh}
  .row{display:flex;align-items:center;gap:2.5vw}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:4vw;flex:1;align-items:center}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:3.5vw;flex:1;align-content:center}
  .grid-4{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:3.5vh 5vw;flex:1;align-content:center}
  .grid-2-7-5{display:grid;grid-template-columns:7fr 5fr;gap:3vw 4vh;align-items:start}
  .grid-2-6-6{display:grid;grid-template-columns:1fr 1fr;gap:3vw 4vh;align-items:start}
  .grid-2-8-4{display:grid;grid-template-columns:8fr 4fr;gap:3vw 4vh;align-items:start}

  /* Cards & Boxes */
  .mag-card{border:1px solid rgba(var(--text-rgb),.15);padding:2vh 1.8vw;background:rgba(var(--surface-rgb),.5)}
  .mag-card.highlight{border-color:var(--accent)}
  .mag-card.emphasis{border-color:var(--accent);border-width:2px}
  .stat-card{display:flex;flex-direction:column;gap:.8vh;align-items:flex-start;padding-top:1.4vh;border-top:2px solid var(--accent)}
  .stat-card .stat-label{font-family:var(--mono);font-size:max(9px,.72vw);letter-spacing:.26em;text-transform:uppercase;opacity:.5;color:var(--text-dim)}
  .stat-card .stat-val{font-family:var(--serif-en);font-weight:800;font-size:5vw;line-height:.9;letter-spacing:-.03em;font-feature-settings:"tnum";margin-top:.4vh;color:var(--accent)}
  .stat-card .stat-note{font-family:var(--sans-zh);font-weight:400;font-size:max(12px,.9vw);line-height:1.5;opacity:.65;margin-top:.6vh;color:var(--text-soft)}

  .callout{padding:2.5vh 2.2vw;border-left:3px solid var(--accent);font-family:var(--serif-zh);font-size:max(14px,1.15vw);line-height:1.55;opacity:.9;background:rgba(var(--accent-rgb),.06)}
  .callout .cite{display:block;margin-top:1.4vh;font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;opacity:.55;color:var(--text-dim)}

  /* Pipeline */
  .pipeline-section{margin-top:3.6vh;padding-top:2.4vh}
  .pipeline-section:first-of-type{border-top:0;padding-top:0;margin-top:2.4vh}
  .pipeline-label{font-family:var(--mono);font-size:max(10px,.8vw);letter-spacing:.26em;text-transform:uppercase;opacity:.58;margin-bottom:2vh;color:var(--text-dim)}
  .pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:1.2vw}
  .pipeline[data-cols="3"]{grid-template-columns:repeat(3,1fr)}
  .pipeline[data-cols="4"]{grid-template-columns:repeat(4,1fr)}
  .step{display:flex;flex-direction:column;gap:.6vh;padding-top:1.2vh;border-top:1px solid rgba(var(--text-rgb),.2)}
  .step-nb{font-family:var(--mono);font-weight:500;font-size:1vw;color:var(--accent)}
  .step-title{font-family:var(--sans-zh);font-weight:700;font-size:1.4vw;letter-spacing:.01em;line-height:1.2}
  .step-desc{font-family:var(--sans-zh);font-weight:400;font-size:max(11px,.9vw);line-height:1.45;opacity:.68;color:var(--text-soft)}

  /* Image */
  .frame-img{overflow:hidden;position:relative;background:rgba(var(--text-rgb),.03);width:100%}
  .frame-img > img{width:100%;height:100%;object-fit:cover;display:block}
  .frame-img.r-16x9{aspect-ratio:16/9;max-height:60vh}
  .frame-img.r-4x3{aspect-ratio:4/3;max-height:52vh}
  .frame-img.r-3x2{aspect-ratio:3/2;max-height:42vh}
  .img-cap{display:block;margin-top:.6vh;font-family:var(--mono);font-size:max(9px,.75vw);letter-spacing:.24em;text-transform:uppercase;opacity:.55;color:var(--text-dim)}

  /* Icons */
  .ico{width:1em;height:1em;display:inline-block;vertical-align:-.12em;stroke:currentColor;fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .ico-md{width:1.6vw;height:1.6vw;stroke-width:1.3;display:inline-block;vertical-align:-.35em}

  /* Navigation */
  #nav{position:fixed;left:50%;bottom:2.4vh;transform:translateX(-50%);z-index:30;display:flex;gap:10px;padding:6px 14px;border-radius:999px;background:rgba(0,0,0,.25);backdrop-filter:blur(8px)}
  #nav .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);cursor:pointer;transition:all .3s ease;border:0;padding:0}
  #nav .dot:hover{background:rgba(255,255,255,.4);transform:scale(1.15)}
  #nav .dot.active{background:var(--accent);width:20px;border-radius:999px}
  #hint{position:fixed;bottom:2.8vh;right:2.8vw;z-index:30;font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;opacity:.35;color:var(--text-dim)}
  body.low-power #hint{opacity:.65;color:var(--accent)}

  /* Animation */
  [data-anim]{opacity:1}
  body.motion-ready [data-anim]{opacity:0;transform:translateY(0)}
  body.motion-ready [data-anim="left"]{transform:translateX(-20px)}
  body.motion-ready [data-anim="right"]{transform:translateX(20px)}
  body.motion-ready [data-anim="line"]{opacity:0;transform:translateY(8px)}
  body.motion-ready [data-animate="pipeline"] [data-anim]{opacity:.15}
  body.low-power #deck{transition:none!important}
  body.low-power *,body.low-power *::before,body.low-power *::after{animation:none!important;transition:none!important}
  body.low-power.motion-ready [data-anim],body.low-power [data-anim]{opacity:1!important;transform:none!important}

  @media (max-width:900px){
    .h-hero{font-size:14vw}.h-xl{font-size:9vw}.h-sub{font-size:4.5vw}.lead{font-size:2.8vw}
    .pipeline{grid-template-columns:repeat(2,1fr)}.split,.grid-2-7-5,.grid-2-6-6,.grid-2-8-4{grid-template-columns:1fr}
  }
</style>

<script>
(function(){
  const KEY='flycan-mag-low-power';
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const stored=localStorage.getItem(KEY);
  window.__lowPowerMode=stored==='1'||(stored===null&&reduced);
  function updateHint(){const h=document.getElementById('hint');if(h)h.textContent=`← → · B ${window.__lowPowerMode?'动态':'静态'} · ESC`;}
  window.__setLowPowerMode=function(on,opts={}){window.__lowPowerMode=!!on;document.body.classList.toggle('low-power',window.__lowPowerMode);if(opts.persist!==false)localStorage.setItem(KEY,window.__lowPowerMode?'1':'0');if(window.__lowPowerMode&&document.getAnimations)document.getAnimations().forEach(a=>a.cancel());updateHint();if(window.__playSlide)window.__playSlide(window.__currentSlideIndex||0);};
  document.body.classList.toggle('low-power',window.__lowPowerMode);
  addEventListener('DOMContentLoaded',updateHint,{once:true});
})();
</script>

<div id="hint">← → · B 静态 · ESC 索引</div>

<div id="deck">

<!-- SLIDES_HERE -->

</div>

<div id="nav"></div>

<script>
const deck=document.getElementById('deck');
const slides=deck.querySelectorAll('.slide');
const nav=document.getElementById('nav');
let idx=0,total=slides.length,lock=false;
deck.style.width=(total*100)+'vw';
slides.forEach((s,i)=>{
  const b=document.createElement('button');
  b.className='dot';b.dataset.i=i;b.setAttribute('aria-label','Page '+(i+1));
  b.onclick=()=>go(i);
  nav.appendChild(b);
});
function go(n){
  if(lock)return;
  idx=Math.max(0,Math.min(total-1,n));
  window.__currentSlideIndex=idx;
  deck.style.transform=`translateX(${-idx*100}vw)`;
  nav.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
  const el=slides[idx];const bgs=el.classList.contains('hero');
  document.body.classList.toggle('hero-bg',bgs);
  if(window.__playSlide)setTimeout(()=>window.__playSlide(idx),450);
  lock=true;setTimeout(()=>lock=false,700);
}
let overviewOn=false;
const ov=document.createElement('div');
ov.id='overview';ov.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(var(--bg-rgb),.95);backdrop-filter:blur(12px);display:none;overflow-y:auto;padding:4vh 4vw';
document.body.appendChild(ov);
function buildOverview(){
  ov.innerHTML='';const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:2vh 1.6vw;max-width:90vw;margin:0 auto';
  slides.forEach((s,i)=>{const c=document.createElement('div');c.style.cssText='cursor:pointer;overflow:hidden;border:2px solid '+(i===idx?'var(--accent)':'rgba(127,127,127,.2)')+';transition:border-color .2s';const w=document.createElement('div');w.style.cssText='width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;pointer-events:none;background:var(--bg)';const cl=s.cloneNode(true);cl.style.cssText='width:100vw;height:100vh;transform:scale('+(1/4.5)+');transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none';w.appendChild(cl);const l=document.createElement('div');l.style.cssText='padding:6px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim)';l.textContent=(i+1)+' / '+total;c.appendChild(w);c.appendChild(l);c.onclick=()=>{toggleOverview();go(i)};grid.appendChild(c);});
  ov.appendChild(grid);
}
function toggleOverview(){overviewOn=!overviewOn;if(overviewOn){buildOverview();ov.style.display='block';}else{ov.style.display='none';}}
addEventListener('keydown',e=>{
  if(e.key==='Escape'){e.preventDefault();toggleOverview();return;}
  if(e.key&&e.key.toLowerCase()==='b'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){e.preventDefault();window.__setLowPowerMode(!window.__lowPowerMode);return;}
  if(overviewOn)return;
  if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '||e.key==='ArrowDown'){if(window.__pipeAdvance&&window.__pipeAdvance())return;go(idx+1);return;}
  if(e.key==='ArrowLeft'||e.key==='PageUp'||e.key==='ArrowUp')go(idx-1);
  if(e.key==='Home')go(0);if(e.key==='End')go(total-1);
});
let wheelTO=null,wheelAcc=0;
addEventListener('wheel',e=>{wheelAcc+=e.deltaY+e.deltaX;if(Math.abs(wheelAcc)>50){if(wheelAcc>0&&window.__pipeAdvance&&window.__pipeAdvance()){wheelAcc=0;}else{go(idx+(wheelAcc>0?1:-1));wheelAcc=0;}}clearTimeout(wheelTO);wheelTO=setTimeout(()=>wheelAcc=0,150);},{passive:true});
let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;const dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){if(dx<0&&window.__pipeAdvance&&window.__pipeAdvance())return;go(idx+(dx<0?1:-1));}},{passive:true});
go(0);
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>

<script type="module">
let motion;
try{motion=await import('./assets/motion.min.js');}catch(e1){try{motion=await import('https://cdn.jsdelivr.net/npm/motion@11.11.17/+esm');}catch(e2){console.warn('[motion] failed',e1,e2);document.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none'});document.querySelectorAll('[data-animate="pipeline"] [data-anim]').forEach(el=>el.style.opacity='1');}}
if(motion){const{animate,stagger}=motion;document.body.classList.add('motion-ready');const EASE=[.22,1,.36,1];const slides=[...document.querySelectorAll('.slide')];let pipeStep=-1,lastIdx=-1;
function resetAnims(s){s.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='';el.style.transform='';});}
function revealStatic(s){resetAnims(s);document.getAnimations?.().forEach(a=>a.cancel());s.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='1';el.style.transform='none';});}
function playSlide(i){const slide=slides[i];if(!slide)return;lastIdx=i;const recipe=slide.dataset.animate||(slide.classList.contains('hero')?'hero':'cascade');if(window.__lowPowerMode){revealStatic(slide);return;}if(recipe==='pipeline'){pipeStep=-1;slide.querySelectorAll('[data-anim]').forEach(el=>{el.style.opacity='0.15';el.style.transform='none';});return;}resetAnims(slide);const all=[...slide.querySelectorAll('[data-anim]')];if(!all.length)return;if(recipe==='directional'){const l=all.filter(el=>el.dataset.anim==='left');const r=all.filter(el=>el.dataset.anim==='right');const o=all.filter(el=>!['left','right'].includes(el.dataset.anim));if(o.length)animate(o,{opacity:[0,1],y:[10,0]},{duration:.6,delay:stagger(.1,{start:.15}),easing:EASE});if(l.length)animate(l,{opacity:[0,1],x:[-20,0]},{duration:.7,delay:.3,easing:EASE});if(r.length)animate(r,{opacity:[0,1],x:[20,0]},{duration:.7,delay:.9,easing:EASE});return;}if(recipe==='quote'){const lines=all.filter(el=>el.dataset.anim==='line');const o=all.filter(el=>el.dataset.anim!=='line');if(o.length)animate(o,{opacity:[0,1],y:[8,0]},{duration:.5,delay:stagger(.1,{start:.15}),easing:EASE});if(lines.length)animate(lines,{opacity:[.35,1],y:[8,0]},{duration:.7,delay:stagger(.5,{start:.4}),easing:EASE});return;}if(recipe==='hero'){animate(all,{opacity:[0,1],y:[14,0]},{duration:.8,delay:stagger(.14,{start:.2}),easing:EASE});return;}animate(all,{opacity:[0,1],y:[12,0]},{duration:.6,delay:stagger(.08,{start:.12}),easing:EASE});}
function pipeAdvance(){if(window.__lowPowerMode)return false;const slide=slides[lastIdx];if(!slide||slide.dataset.animate!=='pipeline')return false;const steps=[...slide.querySelectorAll('[data-anim="step"]')];if(pipeStep>=steps.length-1)return false;pipeStep++;animate(steps[pipeStep],{opacity:[0.15,1],y:[8,0]},{duration:.4,easing:EASE});return true;}
window.__playSlide=playSlide;window.__pipeAdvance=pipeAdvance;playSlide(0);}
</script>
